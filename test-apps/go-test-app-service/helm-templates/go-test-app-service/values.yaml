SAMPLE_SERVICE_ENABLED: true
# When false, the DBaaS secrets are NOT mounted into the pod — the client then falls back to
# resolving each database via the REST aggregator API (used by the REST-fallback test phase).
MOUNT_SECRETS: true
SERVICE_NAME: go-test-app-service
APPLICATION_NAME: dbaas
MANAGED_BY: Helm
NAMESPACE: dbaas
REPLICAS: 1
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-go-test-app-service
TAG: latest
IMAGE_PULL_POLICY: IfNotPresent

NODE_SELECTOR_DBAAS_KEY: region
REGION_DBAAS: database

LOG_LEVEL: info
DBAAS_AGENT: http://dbaas-aggregator.dbaas:8080
# Direct-M2M phase toggle. When true, the pod mounts a `dbaas`-audience projected token and the
# base client calls API_DBAAS_ADDRESS directly with a Bearer (no dbaas-agent). Default false keeps
# the mounted-secret / REST-fallback phases unchanged.
M2M_ENABLED: false
# Direct aggregator URL used only when M2M_ENABLED is true (koanf key api.dbaas.address).
API_DBAAS_ADDRESS: ""
BASECLIENT_RETRY_MAX_ATTEMPTS: 0
BASECLIENT_RETRY_DELAY_MS: 10

DB_TYPE: postgresql
# Fixed tenant for the tenant-scoped quadrants; the app pins this tenant in the request context so the
# classifier is a static {scope=tenant, tenantId=acme} that matches the mounted secret.
TENANT_ID: acme
# Role for the role-scoped quadrants (Q2/Q4). MUST match the app's adminRole constant ("admin").
DATABASE_SECRET_USER_ROLE: admin

# Two logical databases: one service-scoped, one tenant-scoped.
INTERNAL_DATABASES:
  - name: go-test-app-service-postgres
    scope: service
  - name: go-test-app-service-postgres-tenant
    scope: tenant

# Four mounted secrets — one per (scope x role) quadrant. Each is matched by the app's matching
# datasource via (classifier, type, userRole):
#   Q1 service + no role | Q2 service + admin | Q3 tenant + no role | Q4 tenant + admin
SECRET_CLAIMS:
  - claimName: go-test-app-service-postgres-claim
    secretName: go-test-app-service-postgres
    scope: service
  - claimName: go-test-app-service-postgres-admin-claim
    secretName: go-test-app-service-postgres-admin
    scope: service
    role: true
  - claimName: go-test-app-service-postgres-tenant-claim
    secretName: go-test-app-service-postgres-tenant
    scope: tenant
  - claimName: go-test-app-service-postgres-tenant-admin-claim
    secretName: go-test-app-service-postgres-tenant-admin
    scope: tenant
    role: true


CPU_REQUEST: 10m
MEMORY_REQUEST: 64Mi
CPU_LIMIT: 500m
MEMORY_LIMIT: 128Mi
