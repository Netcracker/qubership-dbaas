{{- if .Values.SAMPLE_SERVICE_ENABLED }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.SERVICE_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    app.kubernetes.io/component: sample-service
    app.kubernetes.io/technology: go
spec:
  replicas: {{ .Values.REPLICAS | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
  template:
    metadata:
      labels:
        app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
        app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    spec:
      nodeSelector:
        {{ .Values.NODE_SELECTOR_DBAAS_KEY }}: '{{ .Values.REGION_DBAAS }}'
      securityContext:
        fsGroup: 10001
      volumes:
        # One volume per mounted secret — one secret per (scope x role) quadrant. The DBaaS client
        # reads connectionProperties.json + metadata.json from /etc/secrets/dbaas-secrets/<secretName>.
        {{- if .Values.MOUNT_SECRETS }}
        {{- range .Values.SECRET_CLAIMS }}
        - name: 'secret-{{ .secretName }}'
          secret:
            secretName: '{{ .secretName }}'
        {{- end }}
        {{- end }}
        # Projected service-account token (audience=dbaas) for M2M Bearer auth to dbaas-aggregator
        # on the REST-fallback path. The dbaasbase client (M2MRestClient) reads it via tokensource
        # from /var/run/secrets/tokens/dbaas/token. Present in both phases; only used when the
        # mounted secret is absent (the REST-fallback pass).
        - name: projected-tokens
          projected:
            defaultMode: 292
            sources:
              - serviceAccountToken:
                  path: dbaas/token
                  audience: dbaas
                  expirationSeconds: 600
      containers:
        - name: '{{ .Values.SERVICE_NAME }}'
          image: '{{ .Values.IMAGE_REPOSITORY }}:{{ .Values.TAG }}'
          imagePullPolicy: '{{ .Values.IMAGE_PULL_POLICY }}'
          env:
            - name: MICROSERVICE_NAME
              value: '{{ .Values.SERVICE_NAME }}'
            - name: MICROSERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: '{{ lower .Values.LOG_LEVEL }}'
            - name: DBAAS_AGENT
              value: '{{ .Values.DBAAS_AGENT }}'
            # M2M (Bearer) auth: the dbaasbase client sends the projected SA token (audience=dbaas)
            # to dbaas-aggregator on the REST-fallback path. In M2M mode the client prefers
            # api.dbaas.address over dbaas.agent for the aggregator URL, so mirror it here.
            - name: SECURITY_M2M_KUBERNETES_ENABLED
              value: 'true'
            - name: API_DBAAS_ADDRESS
              value: '{{ .Values.DBAAS_AGENT }}'
            - name: BASECLIENT_RETRY_MAX_ATTEMPTS
              value: '{{ .Values.BASECLIENT_RETRY_MAX_ATTEMPTS }}'
            - name: BASECLIENT_RETRY_DELAY_MS
              value: '{{ .Values.BASECLIENT_RETRY_DELAY_MS }}'
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            {{- if .Values.MOUNT_SECRETS }}
            {{- range .Values.SECRET_CLAIMS }}
            - name: 'secret-{{ .secretName }}'
              mountPath: /etc/secrets/dbaas-secrets/{{ .secretName }}
              readOnly: true
            {{- end }}
            {{- end }}
            - name: projected-tokens
              mountPath: /var/run/secrets/tokens
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: '{{ .Values.CPU_REQUEST }}'
              memory: '{{ .Values.MEMORY_REQUEST }}'
            limits:
              cpu: '{{ .Values.CPU_LIMIT }}'
              memory: '{{ .Values.MEMORY_LIMIT }}'
{{- end }}
