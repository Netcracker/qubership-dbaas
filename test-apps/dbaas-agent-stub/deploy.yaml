# Minimal dbaas-agent stand-in for the REST-fallback test phase (see main.go). Deployed as the
# Service `dbaas-agent` so the sample clients reach it on their native dbaas-agent address. The
# __NAMESPACE__ / __IMAGE__ placeholders are substituted by the workflow before kubectl apply.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-agent
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: dbaas-agent
    app.kubernetes.io/component: test-fixture
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dbaas-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dbaas-agent
    spec:
      containers:
        - name: dbaas-agent
          image: __IMAGE__
          imagePullPolicy: Never
          env:
            - name: AGGREGATOR_URL
              value: http://dbaas-aggregator.__NAMESPACE__:8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dbaas-agent
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: dbaas-agent
spec:
  selector:
    app.kubernetes.io/name: dbaas-agent
  ports:
    - name: http
      port: 8080
      targetPort: http
