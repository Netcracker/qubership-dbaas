quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# DBaaS classifier identity (service scope). The dbaas-datasource extension builds the classifier
# from these, then resolves the database from the mounted secret before any REST call.
cloud.microservice.name=${MICROSERVICE_NAME:quarkus-test-app-service}
cloud.microservice.namespace=${MICROSERVICE_NAMESPACE:default}

# Route the default/service datasource to the service-scoped dbaas database.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false
quarkus.dbaas.datasource.main-type=service

# Basic-auth dbaas client (avoids the M2M k8s-token dependency at startup). With url + username +
# password all set, DbaasClientProducer builds the basic-auth client. The address is consulted only
# on a mounted-secret miss; on that REST-fallback path cluster-dba (DB_CLIENT role) lets get-or-create
# succeed. Pass A points the address at an unreachable host to prove the mounted secret is the source.
quarkus.dbaas.api.aggregator.address=${API_DBAAS_ADDRESS:http://dbaas-aggregator:8080}
quarkus.dbaas.api.aggregator.username=${DBAAS_API_USERNAME:cluster-dba}
quarkus.dbaas.api.aggregator.password=${DBAAS_API_PASSWORD:password}

# dbaas Flyway integration. The table is created by migrating classpath:db/migration on the
# dbaas-resolved datasource (run lazily on first request via MigrationService). A dbaas-provisioned
# database already has a non-empty public schema, so Flyway must baseline it before applying
# migrations; baseline at version 0 (baseline-on-migrate defaults to true) so V1 still runs.
quarkus.dbaas.flyway.location=classpath:db/migration
quarkus.dbaas.flyway.baseline-version=0

quarkus.log.level=${LOG_LEVEL:INFO}
