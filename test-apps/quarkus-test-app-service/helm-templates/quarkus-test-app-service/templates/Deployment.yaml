{{- if .Values.SAMPLE_SERVICE_ENABLED }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.SERVICE_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    app.kubernetes.io/component: sample-service
    app.kubernetes.io/technology: quarkus
spec:
  replicas: {{ .Values.REPLICAS | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
  template:
    metadata:
      labels:
        app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
        app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    spec:
      nodeSelector:
        {{ .Values.NODE_SELECTOR_DBAAS_KEY }}: '{{ .Values.REGION_DBAAS }}'
      securityContext:
        fsGroup: 10001
      volumes:
        # The DBaaS PostgreSQL client reads connectionProperties.json + metadata.json from
        # /etc/secrets/dbaas-secrets/<secretName> before any REST call to dbaas-aggregator.
        # One volume per mounted secret — one secret per (scope x role) quadrant.
        {{- if .Values.MOUNT_SECRETS }}
        {{- range .Values.SECRET_CLAIMS }}
        - name: 'secret-{{ .secretName }}'
          secret:
            secretName: '{{ .secretName }}'
        {{- end }}
        {{- end }}
        # Writable temp dir so the JVM can run with a read-only root filesystem.
        - name: tmp
          emptyDir: {}
      containers:
        - name: '{{ .Values.SERVICE_NAME }}'
          image: '{{ .Values.IMAGE_REPOSITORY }}:{{ .Values.TAG }}'
          imagePullPolicy: '{{ .Values.IMAGE_PULL_POLICY }}'
          env:
            - name: MICROSERVICE_NAME
              value: '{{ .Values.SERVICE_NAME }}'
            - name: MICROSERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: '{{ .Values.LOG_LEVEL }}'
            - name: API_DBAAS_ADDRESS
              value: '{{ .Values.API_DBAAS_ADDRESS }}'
            - name: JAVA_TOOL_OPTIONS
              value: '{{ .Values.JAVA_TOOL_OPTIONS }}'
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            {{- if .Values.MOUNT_SECRETS }}
            {{- range .Values.SECRET_CLAIMS }}
            - name: 'secret-{{ .secretName }}'
              mountPath: /etc/secrets/dbaas-secrets/{{ .secretName }}
              readOnly: true
            {{- end }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: '{{ .Values.CPU_REQUEST }}'
              memory: '{{ .Values.MEMORY_REQUEST }}'
            limits:
              cpu: '{{ .Values.CPU_LIMIT }}'
              memory: '{{ .Values.MEMORY_LIMIT }}'
{{- end }}
