{{- if .Values.SAMPLE_SERVICE_ENABLED }}
apiVersion: dbaas.netcracker.com/v1
kind: DatabaseSecretClaim
metadata:
  name: '{{ .Values.DATABASE_SECRET_CLAIM_NAME }}'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
spec:
  classifier:
    microserviceName: '{{ .Values.SERVICE_NAME }}'
    namespace: '{{ .Values.NAMESPACE }}'
    scope: service
  secretName: '{{ .Values.DATABASE_SECRET_NAME }}'
  type: '{{ .Values.DB_TYPE }}'
  {{- if .Values.DATABASE_SECRET_USER_ROLE }}
  userRole: '{{ .Values.DATABASE_SECRET_USER_ROLE }}'
  {{- end }}
{{- end }}
