SAMPLE_SERVICE_ENABLED: true
SERVICE_NAME: quarkus-test-app-service
APPLICATION_NAME: dbaas
MANAGED_BY: Helm
NAMESPACE: dbaas
REPLICAS: 1
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-quarkus-test-app-service
TAG: latest
IMAGE_PULL_POLICY: IfNotPresent

NODE_SELECTOR_DBAAS_KEY: region
REGION_DBAAS: database

LOG_LEVEL: info
# REST fallback target. The mounted secret is consulted first; the integration test sets this to a
# bogus host to prove the service keeps working without dbaas-aggregator.
API_DBAAS_ADDRESS: http://dbaas-aggregator.dbaas:8080
# Caps the JVM heap to a fraction of the container memory limit.
JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"

DB_TYPE: postgresql
INTERNAL_DATABASE_NAME: quarkus-test-app-service-postgres
DATABASE_SECRET_CLAIM_NAME: quarkus-test-app-service-postgres-claim
DATABASE_SECRET_NAME: quarkus-test-app-service-postgres
DATABASE_SECRET_USER_ROLE: ""

CPU_REQUEST: 100m
MEMORY_REQUEST: 256Mi
CPU_LIMIT: "1"
MEMORY_LIMIT: 768Mi
