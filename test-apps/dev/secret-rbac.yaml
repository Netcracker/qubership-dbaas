# Namespaced Secret RBAC for the sample-service integration tests.
#
# The operator holds NO cluster-wide Secret access (see
# dbaas-operator/config/samples/namespaced-secret-rbac.yaml), so every namespace it serves must
# grant its ServiceAccount Secret access via a Role + RoleBinding. Here the operator runs in and
# serves __TEST_NAMESPACE__, so the binding subject is the operator ServiceAccount in that same
# namespace. Applied once (with __TEST_NAMESPACE__ substituted) alongside the NamespaceBinding;
# without it the operator cannot materialize the DatabaseSecretClaim Secrets the sample services
# mount (it would fail with `forbidden`).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbaas-operator-secrets
  namespace: __TEST_NAMESPACE__
  labels:
    app.kubernetes.io/name: dbaas-sample-services
    app.kubernetes.io/part-of: dbaas
    app.kubernetes.io/managed-by: test-resource
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbaas-operator-secrets
  namespace: __TEST_NAMESPACE__
  labels:
    app.kubernetes.io/name: dbaas-sample-services
    app.kubernetes.io/part-of: dbaas
    app.kubernetes.io/managed-by: test-resource
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dbaas-operator-secrets
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: __TEST_NAMESPACE__
