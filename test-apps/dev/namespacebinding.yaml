apiVersion: dbaas.netcracker.com/v1
kind: NamespaceBinding
# Shared test-namespace binding for the sample services (go + spring). It is a per-namespace
# object (single "binding"), applied once by the integration test workflow with __TEST_NAMESPACE__
# substituted, so it is not tied to any single service.
metadata:
  name: binding
  namespace: __TEST_NAMESPACE__
  labels:
    app.kubernetes.io/name: dbaas-sample-services
    app.kubernetes.io/part-of: dbaas
    app.kubernetes.io/managed-by: test-resource
spec:
  operatorNamespace: __TEST_NAMESPACE__
