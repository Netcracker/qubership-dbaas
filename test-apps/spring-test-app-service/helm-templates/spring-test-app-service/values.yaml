SAMPLE_SERVICE_ENABLED: true
SERVICE_NAME: spring-test-app-service
APPLICATION_NAME: dbaas
MANAGED_BY: Helm
NAMESPACE: dbaas
REPLICAS: 1
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-spring-test-app-service
TAG: latest
IMAGE_PULL_POLICY: IfNotPresent

NODE_SELECTOR_DBAAS_KEY: region
REGION_DBAAS: database

LOG_LEVEL: info
# REST fallback target. The mounted secret is consulted first; the integration test sets this
# to a bogus host to prove the service keeps working without dbaas-aggregator.
API_DBAAS_ADDRESS: http://dbaas-aggregator.dbaas:8080
# Caps the JVM heap to a fraction of the container memory limit.
JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"

DB_TYPE: postgresql
# Fixed tenant for the tenant-scoped quadrants; the app pins this tenant in TenantContext so the
# classifier is a static {scope=tenant, tenantId=acme} that matches the mounted secret.
TENANT_ID: acme
# Role for the role-scoped quadrants (Q2/Q4). MUST match the app's sample.dbaas.user-role
# (QuadrantDataSourceConfiguration default = "admin").
DATABASE_SECRET_USER_ROLE: admin

# Two logical databases: one service-scoped, one tenant-scoped.
INTERNAL_DATABASES:
  - name: spring-test-app-service-postgres
    scope: service
  - name: spring-test-app-service-postgres-tenant
    scope: tenant

# Four mounted secrets — one per (scope x role) quadrant. Each is matched by the app's matching
# datasource via (classifier, type, userRole):
#   Q1 service + no role | Q2 service + admin | Q3 tenant + no role | Q4 tenant + admin
SECRET_CLAIMS:
  - claimName: spring-test-app-service-postgres-claim
    secretName: spring-test-app-service-postgres
    scope: service
  - claimName: spring-test-app-service-postgres-admin-claim
    secretName: spring-test-app-service-postgres-admin
    scope: service
    role: true
  - claimName: spring-test-app-service-postgres-tenant-claim
    secretName: spring-test-app-service-postgres-tenant
    scope: tenant
  - claimName: spring-test-app-service-postgres-tenant-admin-claim
    secretName: spring-test-app-service-postgres-tenant-admin
    scope: tenant
    role: true

CPU_REQUEST: 100m
MEMORY_REQUEST: 256Mi
CPU_LIMIT: "1"
MEMORY_LIMIT: 768Mi
