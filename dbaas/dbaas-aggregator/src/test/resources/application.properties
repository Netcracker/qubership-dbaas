quarkus.datasource.jdbc.max-size=10
quarkus.datasource.process-orchestrator.jdbc.max-size=10
dbaas.process-orchestrator.enabled=false
dbaas.h2.sync.every=86400

dbaas.security.users.configuration.location=/users.json
dbaas.security.k8s.service.account.roles.path=/service-account-roles-secret.yaml
dbaas.security.k8s.jwt.enabled=false
dbaas.global-permissions.configuration.location=/services.json

dbaas.operator.notification.enabled=${KUBERNETES_JWT_ENABLED:true}
dbaas.operator.notification.callback-url=${DBAAS_OPERATOR_NOTIFICATION_CALLBACK_URL:http://dbaas-operator:8080}
dbaas.operator.notification.jwt-audience=${DBAAS_OPERATOR_NOTIFICATION_JWT_AUDIENCE:dbaas-operator}
dbaas.operator.notification.retry-delay=${DBAAS_OPERATOR_NOTIFICATION_RETRY_DELAY:PT10S}
dbaas.operator.notification.max-attempts=${DBAAS_OPERATOR_NOTIFICATION_MAX_ATTEMPTS:10}
dbaas.operator.notification.sent-ttl=${DBAAS_OPERATOR_NOTIFICATION_SENT_TTL:PT168H}
dbaas.operator.notification.failed-ttl=${DBAAS_OPERATOR_NOTIFICATION_FAILED_TTL:PT720H}
dbaas.operator.notification.connect-timeout=${DBAAS_OPERATOR_NOTIFICATION_CONNECT_TIMEOUT:PT30S}
dbaas.operator.notification.read-timeout=${DBAAS_OPERATOR_NOTIFICATION_READ_TIMEOUT:PT30S}
dbaas.operator.notification.invisibility-time=${DBAAS_OPERATOR_INVISIBILITY_TIME:PT1M}