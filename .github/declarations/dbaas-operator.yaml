apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: externaldatabasedeclarations.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    kind: ExternalDatabaseDeclaration
    listKind: ExternalDatabaseDeclarationList
    plural: externaldatabasedeclarations
    singular: externaldatabasedeclaration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.dbName
      name: DbName
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExternalDatabaseDeclaration is the Schema for the externaldatabasedeclarations API.
          It registers a pre-existing (externally managed) database in dbaas so that
          microservices can discover its connection details through the standard dbaas API.
          Unlike DatabaseDeclaration, the physical database is not created or destroyed by dbaas;
          dbaas only stores and serves its connection properties.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ExternalDatabaseDeclaration.
            properties:
              classifier:
                additionalProperties:
                  type: string
                description: |-
                  classifier is a key-value map that uniquely identifies the external database in dbaas.
                  Typical keys: namespace, microserviceName, scope, tenantId.
                  The aggregator requires at minimum: microserviceName, scope.
                  If scope is "tenant", tenantId must also be present.
                type: object
              connectionProperties:
                description: |-
                  connectionProperties lists the connection details for each access role.
                  At least one entry is required. Each entry must have a "role" field; the
                  aggregator rejects requests where any entry is missing "role".
                items:
                  description: |-
                    ConnectionProperty describes how to connect to the external database for a specific role.
                    The controller assembles a flat map from role, credentialsSecretRef, and extraProperties
                    before sending the request to dbaas-aggregator.
                  properties:
                    credentialsSecretRef:
                      description: |-
                        credentialsSecretRef points to a Kubernetes Secret and maps its keys into the
                        aggregator request flat map. The Secret must exist in the same namespace as the CR.
                        Resolved Secret values take precedence over matching keys in extraProperties.
                      properties:
                        keys:
                          items:
                            properties:
                              key:
                                minLength: 1
                                type: string
                              name:
                                minLength: 1
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          minItems: 1
                          type: array
                        name:
                          minLength: 1
                          type: string
                      required:
                      - keys
                      - name
                      type: object
                    extraProperties:
                      additionalProperties:
                        type: string
                      type: object
                    role:
                      minLength: 1
                      type: string
                  required:
                  - role
                  type: object
                minItems: 1
                type: array
              dbName:
                minLength: 1
                type: string
              type:
                minLength: 1
                type: string
            required:
            - classifier
            - connectionProperties
            - dbName
            - type
            type: object
          status:
            description: status defines the observed state of ExternalDatabaseDeclaration.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
