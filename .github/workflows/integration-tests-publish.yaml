name: Integration tests publish

on:
  push:
    branches:
      - main
    paths:
      - 'dbaas/dbaas-integration-tests/**'
  workflow_dispatch:

jobs:
  check-version:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -f dbaas/dbaas-integration-tests/pom.xml)
          BRANCH="${{ github.ref_name }}"
          NORMALIZED_BRANCH_NAME="${BRANCH//\//-}"
          EXPECTED_SUFFIX="${NORMALIZED_BRANCH_NAME}-SNAPSHOT"
          if [[ "$VERSION" != *"$EXPECTED_SUFFIX" ]]; then
            echo "ERROR: Version '$VERSION' does not end with '$EXPECTED_SUFFIX'"
            exit 1
          fi
          echo "Version '$VERSION' is valid for branch '$BRANCH'"

  mvn:
    needs: check-version
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    uses: netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@8668020927f2a84d8d096a359c719c3c3a403520 # v2.5.0
    with:
      upload-artifact: true
      java-version: 21
      pom-file: dbaas/dbaas-integration-tests/pom.xml
      maven-command: 'deploy'
      skip-docker: true
