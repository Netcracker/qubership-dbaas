---
name: Maven build

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

jobs:
  mvn:
    uses: netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@9d3a0721f4cd8cdd9d762ac092c5c5d2d051cdea # v2.5.1
    with:
      upload-artifact: true
      java-version: 25
      maven-command: 'verify'
