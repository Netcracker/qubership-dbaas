---
name: Maven build

on:
  push:
    paths-ignore:
      - 'dbaas-operator/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - 'dbaas-operator/**'

jobs:
  mvn:
    uses: netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@bc2a0bd082147e23b4091616c608a21cc2957728 # v2.4.1
    with:
      upload-artifact: true
      java-version: 21
