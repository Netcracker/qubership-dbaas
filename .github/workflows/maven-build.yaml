---
name: Maven build

on:
  push:
    paths-ignore:
      - 'dbaas-operator/**'
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - 'dbaas-operator/**'

jobs:
  mvn:
    uses: netcracker/qubership-core-infra/.github/workflows/generic-maven-build.yaml@d81c8b5f645e19dc55dc4562bd183eceec29d943 # v2.4.0
    with:
      upload-artifact: true
      java-version: 21
