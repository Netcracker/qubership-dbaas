name: Sample Services Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # Daily at 02:00 UTC

jobs:
  sample-services-integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    env:
      # Both sample images are built in-job and loaded straight into kind (no registry, no
      # dependency on a separate publish workflow, and the exact PR code is what gets tested).
      GO_SERVICE_NAME: go-test-app-service
      GO_IMAGE_REPOSITORY: go-test-app-service
      GO_IMAGE_TAG: it
      SPRING_SERVICE_NAME: spring-test-app-service
      SPRING_IMAGE_REPOSITORY: spring-test-app-service
      SPRING_IMAGE_TAG: it
      QUARKUS_SERVICE_NAME: quarkus-test-app-service
      QUARKUS_IMAGE_REPOSITORY: quarkus-test-app-service
      QUARKUS_IMAGE_TAG: it
      TEST_NAMESPACE: dbaas

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create kind config
        run: |
          cat <<EOF_KIND > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
              labels:
                region: database
            - role: worker
          EOF_KIND

      - name: Set up Kind
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
          config: kind-config.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Lets Maven pull the dbaas-client snapshot from GitHub Packages when building the
          # Spring sample image (read:packages on Netcracker/qubership-core-java-libs).
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Deploy Fluent Bit
        run: |
          kubectl apply -f .github/declarations/fluent-bit-logging.yaml

      - name: Create Patroni service values
        run: |
          cat <<'EOF_PATRONI' > "$GITHUB_WORKSPACE/patroni-services-values.yaml"
          postgresPassword: ${POSTGRES_PASSWORD}

          backupDaemon:
            install: false

          dbaas:
            install: true
            aggregator:
              registrationAddress: http://${DBAAS_SERVICE_NAME}.${DBAAS_NAMESPACE}.svc.cluster.local:8080
              registrationUsername: cluster-dba
              registrationPassword: password

          # The patroni-services chart runs Robot Framework integration tests by default
          # (integration-robot-tests / supplementary-robot-tests). In kind they create+drop a burst of
          # throwaway databases that overwhelms the single-node Patroni and transiently breaks unrelated
          # provisioning (the sample-service tenant claims landed in that window). Disable them — this IT
          # exercises dbaas itself, the patroni self-tests are not needed here.
          tests:
            install: false
          EOF_PATRONI

      - name: Resolve DBaaS image tag
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          if [ "$SAFE_REF" = "main" ]; then
            IMAGE_TAG=latest
          else
            IMAGE_TAG="${SAFE_REF}-snapshot"
          fi
          echo "Using DBaaS image tag: $IMAGE_TAG"
          echo "TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "DBAAS_OPERATOR_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build go test app image and load into kind
        run: |
          docker build -t "$GO_IMAGE_REPOSITORY:$GO_IMAGE_TAG" test-apps/go-test-app-service
          kind load docker-image "$GO_IMAGE_REPOSITORY:$GO_IMAGE_TAG" --name kind

      - name: Build spring test app image and load into kind
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode --no-transfer-progress -f test-apps/spring-test-app-service/pom.xml package -DskipTests
          docker build -t "$SPRING_IMAGE_REPOSITORY:$SPRING_IMAGE_TAG" test-apps/spring-test-app-service
          kind load docker-image "$SPRING_IMAGE_REPOSITORY:$SPRING_IMAGE_TAG" --name kind

      - name: Build quarkus test app image and load into kind
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode --no-transfer-progress -f test-apps/quarkus-test-app-service/pom.xml package -DskipTests
          docker build -t "$QUARKUS_IMAGE_REPOSITORY:$QUARKUS_IMAGE_TAG" test-apps/quarkus-test-app-service
          kind load docker-image "$QUARKUS_IMAGE_REPOSITORY:$QUARKUS_IMAGE_TAG" --name kind

      - name: Deploy DBaaS Aggregator, Operator, and PostgreSQL
        working-directory: bootstrap
        run: >
          make install
          CONFIG_FILE=local.mk
          KUBERNETES_M2M_ENABLED=true
          OPERATOR_M2M_ENABLED=false
          PATRONI_SERVICES_VALUES_FILE=$GITHUB_WORKSPACE/patroni-services-values.yaml
          REPOS_DIR=$(dirname $GITHUB_WORKSPACE)

      - name: Wait for DBaaS deployments
        run: |
          kubectl rollout status deployment/dbaas-aggregator -n "$TEST_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/dbaas-operator -n "$TEST_NAMESPACE" --timeout=300s

      - name: Wait for PostgreSQL readiness
        run: |
          PATRONI_POD="$(kubectl -n postgres get pods -o name | grep '^pod/pg-patroni-' | head -1 | cut -d/ -f2)"
          if [ -z "$PATRONI_POD" ]; then
            echo "No pg-patroni pod found in namespace postgres"
            kubectl -n postgres get pods -o wide
            kubectl -n postgres get svc
            exit 1
          fi
          echo "Waiting for PostgreSQL pod: $PATRONI_POD"
          kubectl -n postgres wait --for=condition=Ready pod/"$PATRONI_POD" --timeout=300s
          for i in {1..60}; do
            if kubectl -n postgres exec "$PATRONI_POD" -- pg_isready -h pg-patroni.postgres -p 5432; then
              exit 0
            fi
            sleep 5
          done
          echo "PostgreSQL did not accept connections in time"
          kubectl -n postgres get pods -o wide
          kubectl -n postgres get svc
          exit 1

      # NamespaceBinding is per-namespace (one object named "binding"), shared by both sample
      # services, so it lives in a common location and is applied once. The operator holds no
      # cluster-wide Secret RBAC, so the namespace also gets a dbaas-operator-secrets Role +
      # RoleBinding (bound to the operator ServiceAccount) — without it the operator cannot
      # materialize the DatabaseSecretClaim Secrets the sample services mount.
      - name: Apply sample service namespace binding and Secret RBAC
        run: |
          sed "s/__TEST_NAMESPACE__/$TEST_NAMESPACE/g" test-apps/dev/secret-rbac.yaml | kubectl apply -f -
          sed "s/__TEST_NAMESPACE__/$TEST_NAMESPACE/g" test-apps/dev/namespacebinding.yaml | kubectl apply -f -
          for i in {1..60}; do
            finalizers="$(kubectl -n "$TEST_NAMESPACE" get namespacebinding binding -o jsonpath='{.metadata.finalizers}' || true)"
            if [[ "$finalizers" == *"platform.dbaas.netcracker.com/binding-protection"* ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "NamespaceBinding/binding was not registered by dbaas-operator in time"
          exit 1

      - name: Deploy go test app service
        run: |
          helm upgrade --install "$GO_SERVICE_NAME" \
            test-apps/go-test-app-service/helm-templates/go-test-app-service \
            -f test-apps/go-test-app-service/helm-templates/go-test-app-service/resource-profiles/dev.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set NAMESPACE="$TEST_NAMESPACE" \
            --set IMAGE_REPOSITORY="$GO_IMAGE_REPOSITORY" \
            --set TAG="$GO_IMAGE_TAG" \
            --set IMAGE_PULL_POLICY="Never" \
            --set DBAAS_AGENT="http://dbaas-aggregator.$TEST_NAMESPACE:8080"

      - name: Deploy spring test app service
        run: |
          # Deploy against the live aggregator (like the go app). The IT then runs a baseline over
          # the mounted-secret datasource, and a second test flips API_DBAAS_ADDRESS to an
          # unreachable host at runtime to prove the service resolves its database from the mounted
          # secret rather than REST. The InternalDatabase/DatabaseSecretClaim are provisioned by the
          # operator, which uses its own aggregator config independent of the service's URL.
          helm upgrade --install "$SPRING_SERVICE_NAME" \
            test-apps/spring-test-app-service/helm-templates/spring-test-app-service \
            -f test-apps/spring-test-app-service/helm-templates/spring-test-app-service/resource-profiles/dev.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set NAMESPACE="$TEST_NAMESPACE" \
            --set IMAGE_REPOSITORY="$SPRING_IMAGE_REPOSITORY" \
            --set TAG="$SPRING_IMAGE_TAG" \
            --set IMAGE_PULL_POLICY="Never" \
            --set API_DBAAS_ADDRESS="http://dbaas-aggregator.$TEST_NAMESPACE:8080"

      - name: Deploy quarkus test app service
        run: |
          # Deploy against an UNREACHABLE aggregator on purpose: the app resolves four datasources
          # (service/tenant x no-role/admin) from four mounted secrets, so a successful insert/list on
          # each /postgres* endpoint proves the connection came from the mount, not a REST call.
          helm upgrade --install "$QUARKUS_SERVICE_NAME" \
            test-apps/quarkus-test-app-service/helm-templates/quarkus-test-app-service \
            -f test-apps/quarkus-test-app-service/helm-templates/quarkus-test-app-service/resource-profiles/dev.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set NAMESPACE="$TEST_NAMESPACE" \
            --set IMAGE_REPOSITORY="$QUARKUS_IMAGE_REPOSITORY" \
            --set TAG="$QUARKUS_IMAGE_TAG" \
            --set IMAGE_PULL_POLICY="Never" \
            --set API_DBAAS_ADDRESS="http://dbaas-aggregator-unreachable.invalid:8080"

      - name: Materialize the static tenant database
        run: |
          # A tenant-scoped InternalDatabase only registers a per-tenant template via /declarations/apply;
          # it does NOT create a concrete {scope=tenant, tenantId=acme} database. The DatabaseSecretClaim
          # only GETs by classifier, so it would wait forever. Create the tenant database once via the
          # aggregator API (exactly as a tenant connection would at runtime); both tenant claims then find
          # it and mint their secrets. Service-scope databases are created by their InternalDatabase directly.
          U=$(kubectl -n postgres get secret dbaas-aggregator-registration-credentials -o jsonpath='{.data.username}' | base64 -d)
          P=$(kubectl -n postgres get secret dbaas-aggregator-registration-credentials -o jsonpath='{.data.password}' | base64 -d)
          kubectl -n "$TEST_NAMESPACE" port-forward svc/dbaas-aggregator 18080:8080 >/tmp/agg-pf.log 2>&1 &
          PF=$!
          for i in {1..30}; do curl -sf -o /dev/null "http://127.0.0.1:18080/health" && break; sleep 2; done
          echo "Creating {scope=tenant, tenantId=acme} database via aggregator:"
          curl -s -w '\nHTTP %{http_code}\n' -u "$U:$P" -X PUT \
            "http://127.0.0.1:18080/api/v3/dbaas/$TEST_NAMESPACE/databases" \
            -H 'Content-Type: application/json' \
            -d "{\"classifier\":{\"microserviceName\":\"quarkus-test-app-service\",\"namespace\":\"$TEST_NAMESPACE\",\"scope\":\"tenant\",\"tenantId\":\"acme\"},\"type\":\"postgresql\",\"originService\":\"quarkus-test-app-service\"}"
          kill $PF 2>/dev/null || true

      - name: Wait for sample services
        run: |
          kubectl -n "$TEST_NAMESPACE" rollout status deployment/"$GO_SERVICE_NAME" --timeout=300s
          kubectl -n "$TEST_NAMESPACE" rollout status deployment/"$SPRING_SERVICE_NAME" --timeout=300s
          kubectl -n "$TEST_NAMESPACE" rollout status deployment/"$QUARKUS_SERVICE_NAME" --timeout=300s

      - name: Run sample service Java integration tests
        id: tests
        working-directory: test-apps/test-apps-integration-tests
        run: >
          mvn --batch-mode
          -Dmaven.test.failure.ignore=true
          -DskipIT=false
          -Dclouds.cloud.name=kind
          -Dclouds.cloud.namespaces.namespace=$TEST_NAMESPACE
          test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Surefire reports
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: sample-services-surefire-reports
          path: test-apps/test-apps-integration-tests/target/surefire-reports/**
          if-no-files-found: warn

      - name: Collect Fluent Bit logs
        id: collect_fluentbit_logs
        if: always()
        run: |
          chmod +x .github/scripts/collect-fluentbit-logs.sh
          .github/scripts/collect-fluentbit-logs.sh

      - name: Upload Fluent Bit logs
        if: always() && steps.collect_fluentbit_logs.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: sample-services-pod-logs
          path: fluentbit-logs/**
          if-no-files-found: warn

      - name: Dump diagnostics on failure
        # always() so this also runs when the deploy/rollout fails (which skips the tests step);
        # the body stays quiet on a fully green run.
        if: always()
        run: |
          set +e
          shopt -s nullglob
          reports=(test-apps/test-apps-integration-tests/target/surefire-reports/TEST-*.xml)
          if [ "${#reports[@]}" -gt 0 ] && ! grep -E 'failures="[1-9]|errors="[1-9]' "${reports[@]}" >/dev/null 2>&1; then
            echo "All sample-service tests passed; skipping diagnostics."
            exit 0
          fi
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Sample-service pods describe (scheduling / FailedMount events)"
          for svc in "$GO_SERVICE_NAME" "$SPRING_SERVICE_NAME" "$QUARKUS_SERVICE_NAME"; do
            kubectl -n "$TEST_NAMESPACE" describe pod -l app.kubernetes.io/name="$svc"
          done
          echo "::endgroup::"
          echo "::group::All InternalDatabase + DatabaseSecretClaim ($TEST_NAMESPACE)"
          kubectl -n "$TEST_NAMESPACE" get internaldatabase,databasesecretclaim -o wide
          kubectl -n "$TEST_NAMESPACE" get internaldatabase,databasesecretclaim -o yaml
          echo "::endgroup::"
          echo "::group::Secrets ($TEST_NAMESPACE)"
          kubectl -n "$TEST_NAMESPACE" get secret -o name
          echo "::endgroup::"
          echo "::group::Physical databases on Patroni + dbaas classifier registry (who created what)"
          PG_POD="$(kubectl -n postgres get pods -o name | grep '^pod/pg-patroni-' | head -1 | cut -d/ -f2)"
          echo "patroni pod: $PG_POD"
          kubectl -n postgres exec "$PG_POD" -- bash -lc "psql -U postgres -P pager=off -c '\l'" 2>&1
          echo "--- every dbaas-managed classifier (microserviceName/namespace/scope/tenantId) by creation time ---"
          kubectl -n postgres exec "$PG_POD" -- bash -lc "psql -U postgres -d dbaas -P pager=off -c \"select time_db_creation, type, namespace, classifier from classifier order by time_db_creation;\"" 2>&1
          echo "::endgroup::"
          for pair in "dbaas-operator:$TEST_NAMESPACE" "dbaas-aggregator:$TEST_NAMESPACE" "dbaas-postgres-adapter:postgres"; do
            d="${pair%%:*}"; ns="${pair##*:}"
            echo "::group::logs $d ($ns)"
            kubectl -n "$ns" logs deploy/"$d" --all-containers=true --tail=2000 2>&1
            echo "::endgroup::"
          done
          echo "::group::Recent events ($TEST_NAMESPACE + postgres)"
          kubectl -n "$TEST_NAMESPACE" get events --sort-by=.lastTimestamp | tail -150
          kubectl -n postgres get events --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"

      - name: Fail job if sample service tests failed
        if: always() && steps.tests.outcome != 'skipped'
        run: |
          shopt -s nullglob
          reports=(test-apps/test-apps-integration-tests/target/surefire-reports/TEST-*.xml)
          if [ "${#reports[@]}" -eq 0 ]; then
            echo "::error::No Surefire XML reports were generated for sample service integration tests"
            exit 1
          fi
          if grep -E 'failures="[1-9]|errors="[1-9]' "${reports[@]}" >/dev/null 2>&1; then
            echo "::error::Sample service integration test failed"
            exit 1
          fi
