name: Go Test App Service Integration Tests

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # Daily at 02:00 UTC

jobs:
  sample-service-integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SAMPLE_SERVICE_NAME: go-test-app-service
      SAMPLE_IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-go-test-app-service
      TEST_NAMESPACE: dbaas


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create kind config
        run: |
          cat <<EOF_KIND > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
              labels:
                region: database
            - role: worker
          EOF_KIND

      - name: Set up Kind
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
          config: kind-config.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Deploy Fluent Bit
        run: |
          kubectl apply -f .github/declarations/fluent-bit-logging.yaml

      - name: Create Patroni service values
        run: |
          cat <<'EOF_PATRONI' > "$GITHUB_WORKSPACE/patroni-services-values.yaml"
          postgresPassword: ${POSTGRES_PASSWORD}

          backupDaemon:
            install: false

          dbaas:
            install: true
            aggregator:
              registrationAddress: http://${DBAAS_SERVICE_NAME}.${DBAAS_NAMESPACE}.svc.cluster.local:8080
              registrationUsername: cluster-dba
              registrationPassword: password
          EOF_PATRONI

      - name: Resolve image tags
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          if [ "$SAFE_REF" = "main" ]; then
            IMAGE_TAG=latest
          else
            IMAGE_TAG="${SAFE_REF}-snapshot"
          fi
          echo "Using DBaaS image tag: $IMAGE_TAG"
          echo "Using go test app service image: ${SAMPLE_IMAGE_REPOSITORY}:$IMAGE_TAG"
          echo "TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "DBAAS_OPERATOR_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy DBaaS Aggregator, Operator, and PostgreSQL
        working-directory: bootstrap
        run: >
          make install
          CONFIG_FILE=local.mk
          KUBERNETES_M2M_ENABLED=true
          OPERATOR_M2M_ENABLED=false
          PATRONI_SERVICES_VALUES_FILE=$GITHUB_WORKSPACE/patroni-services-values.yaml
          REPOS_DIR=$(dirname $GITHUB_WORKSPACE)

      - name: Wait for DBaaS deployments
        run: |
          kubectl rollout status deployment/dbaas-aggregator -n "$TEST_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/dbaas-operator -n "$TEST_NAMESPACE" --timeout=300s

      - name: Wait for PostgreSQL readiness
        run: |
          PATRONI_POD="$(kubectl -n postgres get pods -o name | grep '^pod/pg-patroni-' | head -1 | cut -d/ -f2)"
          if [ -z "$PATRONI_POD" ]; then
            echo "No pg-patroni pod found in namespace postgres"
            kubectl -n postgres get pods -o wide
            kubectl -n postgres get svc
            exit 1
          fi
          echo "Waiting for PostgreSQL pod: $PATRONI_POD"
          kubectl -n postgres wait --for=condition=Ready pod/"$PATRONI_POD" --timeout=300s
          for i in {1..60}; do
            if kubectl -n postgres exec "$PATRONI_POD" -- pg_isready -h pg-patroni.postgres -p 5432; then
              exit 0
            fi
            sleep 5
          done
          echo "PostgreSQL did not accept connections in time"
          kubectl -n postgres get pods -o wide
          kubectl -n postgres get svc
          exit 1

      - name: Apply go test app service namespace binding
        run: |
          sed "s/__TEST_NAMESPACE__/$TEST_NAMESPACE/g" test-apps/go-test-app-service/dev/namespacebinding.yaml | kubectl apply -f -
          for i in {1..60}; do
            finalizers="$(kubectl -n "$TEST_NAMESPACE" get namespacebinding binding -o jsonpath='{.metadata.finalizers}' || true)"
            if [[ "$finalizers" == *"platform.dbaas.netcracker.com/binding-protection"* ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "NamespaceBinding/binding was not registered by dbaas-operator in time"
          exit 1

      - name: Deploy go test app service
        run: |
          helm upgrade --install "$SAMPLE_SERVICE_NAME" \
            test-apps/go-test-app-service/helm-templates/go-test-app-service \
            -f test-apps/go-test-app-service/helm-templates/go-test-app-service/resource-profiles/dev.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set NAMESPACE="$TEST_NAMESPACE" \
            --set IMAGE_REPOSITORY="$SAMPLE_IMAGE_REPOSITORY" \
            --set TAG="$TAG" \
            --set DBAAS_AGENT="http://dbaas-aggregator.$TEST_NAMESPACE:8080"

      - name: Wait for go test app service
        run: |
          kubectl -n "$TEST_NAMESPACE" rollout status deployment/"$SAMPLE_SERVICE_NAME" --timeout=300s

      - name: Run go test app service Java IT
        id: tests
        working-directory: test-apps/test-apps-integration-tests
        run: >
          mvn --batch-mode
          -Dmaven.test.failure.ignore=true
          -DskipIT=false
          -Dtest=GoTestAppServiceIT
          -Dclouds.cloud.name=kind
          -Dclouds.cloud.namespaces.namespace=$TEST_NAMESPACE
          test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dump go test app service logs on IT failure
        if: failure() && steps.tests.outcome == 'failure'
        run: |
          set +e
          echo "::group::go-test-app-service logs"
          kubectl -n "$TEST_NAMESPACE" logs deploy/"$SAMPLE_SERVICE_NAME" --all-containers=true --tail=500
          echo "::endgroup::"
          echo "::group::go-test-app-service previous logs"
          kubectl -n "$TEST_NAMESPACE" logs deploy/"$SAMPLE_SERVICE_NAME" --all-containers=true --previous --tail=500
          echo "::endgroup::"

      - name: Upload Surefire reports
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: go-test-app-service-surefire-reports
          path: test-apps/test-apps-integration-tests/target/surefire-reports/**
          if-no-files-found: warn

      - name: Collect Fluent Bit logs
        id: collect_fluentbit_logs
        if: always()
        run: |
          chmod +x .github/scripts/collect-fluentbit-logs.sh
          .github/scripts/collect-fluentbit-logs.sh

      - name: Upload Fluent Bit logs
        if: always() && steps.collect_fluentbit_logs.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: go-test-app-service-pod-logs
          path: fluentbit-logs/**
          if-no-files-found: warn

      - name: Dump diagnostics on failure
        if: always() && steps.tests.outcome != 'skipped'
        run: |
          set +e
          shopt -s nullglob
          reports=(test-apps/test-apps-integration-tests/target/surefire-reports/TEST-*.xml)
          if [ "${#reports[@]}" -eq 0 ]; then
            echo "::warning::No Surefire XML reports found"
          elif ! grep -E 'failures="[1-9]|errors="[1-9]' "${reports[@]}" >/dev/null 2>&1; then
            exit 0
          fi
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          for pair in "dbaas-operator:$TEST_NAMESPACE" "dbaas-aggregator:$TEST_NAMESPACE" "go-test-app-service:$TEST_NAMESPACE"; do
            d="${pair%%:*}"; ns="${pair##*:}"
            echo "::group::describe deploy/$d ($ns)"
            kubectl -n "$ns" describe deploy/"$d"
            echo "::endgroup::"
            echo "::group::logs $d ($ns, current)"
            kubectl -n "$ns" logs deploy/"$d" --all-containers=true --tail=300
            echo "::endgroup::"
            echo "::group::logs $d ($ns, previous)"
            kubectl -n "$ns" logs deploy/"$d" --all-containers=true --previous --tail=300
            echo "::endgroup::"
          done
          echo "::group::Mounted-secret CRs"
          kubectl -n "$TEST_NAMESPACE" describe internaldatabase go-test-app-service-postgres
          kubectl -n "$TEST_NAMESPACE" describe databasesecretclaim go-test-app-service-postgres-claim
          echo "::endgroup::"
          echo "::group::Recent dbaas events"
          kubectl -n "$TEST_NAMESPACE" get events --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"

      - name: Fail job if go test app service tests failed
        if: always() && steps.tests.outcome != 'skipped'
        run: |
          shopt -s nullglob
          reports=(test-apps/test-apps-integration-tests/target/surefire-reports/TEST-*.xml)
          if [ "${#reports[@]}" -eq 0 ]; then
            echo "::error::No Surefire XML reports were generated for go test app service integration tests"
            exit 1
          fi
          if grep -E 'failures="[1-9]|errors="[1-9]' "${reports[@]}" >/dev/null 2>&1; then
            echo "::error::Go test app service integration test failed"
            exit 1
          fi
