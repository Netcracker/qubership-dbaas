name: Go Build

run-name: >
  Build —
  ${{ github.event_name == 'push' && format('push [{0}]', github.event.head_commit.message) || '' }}
  ${{ github.event_name == 'pull_request' && format('PR ({0}) [{1}]', github.head_ref, github.event.pull_request.title) || '' }}

on:
  push:
    branches:
      - main
    # Skip the operator build for commits that touch only operator docs/dev helpers.
    # paths-ignore skips the run only when EVERY changed file matches; a mixed
    # docs-plus-code commit still builds.
    paths-ignore:
      - 'dbaas-operator/docs/**'
      - 'dbaas-operator/dev/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'dbaas-operator/docs/**'
      - 'dbaas-operator/dev/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and test
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@v2.4.1
    with:
      install-envtest: true
      envtest-version: latest
      docker-config-file: 'docker-go-dev-config.json'
      go-module-dir: 'dbaas-operator'
    secrets: inherit

  # CRDs, DeepCopy and the chart's CRD templates are generated from the markers in
  # api/v1. Regenerate them here and fail if anything differs from what was committed,
  # so a stale artifact cannot reach the chart. The Helm CRD templates used to be
  # synced by hand and had already drifted — the chart shipped shortName "dbdp" while
  # the source said "dbdap", breaking every documented `kubectl get dbdap`.
  verify-generated:
    name: Verify generated artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: dbaas-operator/go.mod
          cache-dependency-path: dbaas-operator/go.sum

      - name: Regenerate and check for drift
        working-directory: dbaas-operator
        run: |
          make manifests generate sync-helm-crds
          # git status --porcelain, unlike git diff, also reports untracked
          # files — a brand-new CRD whose generated artifacts were never
          # committed must fail the check too.
          if [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
            git diff
            echo "::error::Generated artifacts are stale. Run 'make manifests generate sync-helm-crds' in dbaas-operator/ and commit the result."
            exit 1
          fi
