name: Quarkus Test App Service Build

run-name: >
  Build Quarkus Test App Service -
  ${{ github.event_name == 'push' && format('push [{0}]', github.event.head_commit.message) || '' }}
  ${{ github.event_name == 'pull_request' && format('PR ({0}) [{1}]', github.head_ref, github.event.pull_request.title) || '' }}

on:
  push:
    branches:
      - main
    paths:
      - 'test-apps/quarkus-test-app-service/**'
      - '.github/workflows/quarkus-build-sample-service.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'test-apps/quarkus-test-app-service/**'
      - '.github/workflows/quarkus-build-sample-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build quarkus test app service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Configures ~/.m2/settings.xml with a `github` server so Maven can pull the dbaas Quarkus
          # extension snapshot from GitHub Packages (read:packages on Netcracker/qubership-core-java-libs).
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build
        working-directory: test-apps/quarkus-test-app-service
        run: mvn --batch-mode --no-transfer-progress package
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload fast-jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quarkus-test-app-service-fast-jar
          path: test-apps/quarkus-test-app-service/target/quarkus-app/**
          if-no-files-found: error
