name: Go Test App Service Build

run-name: >
  Build Go Test App Service -
  ${{ github.event_name == 'push' && format('push [{0}]', github.event.head_commit.message) || '' }}
  ${{ github.event_name == 'pull_request' && format('PR ({0}) [{1}]', github.head_ref, github.event.pull_request.title) || '' }}

on:
  push:
    branches:
      - main
    paths:
      - 'test-apps/go-test-app-service/**'
      - '.github/workflows/go-build-sample-service.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'test-apps/go-test-app-service/**'
      - '.github/workflows/go-build-sample-service.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and test go test app service
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@v2.4.1
    with:
      docker-config-file: 'docker-go-dev-config.json'
      go-module-dir: 'test-apps/go-test-app-service'
    secrets: inherit
