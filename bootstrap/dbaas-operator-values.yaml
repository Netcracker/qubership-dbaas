
# ============== Node Selector label ============================
NODE_SELECTOR_DBAAS_KEY: ${NODE_SELECTOR_DBAAS_KEY}
REGION_DBAAS: ${REGION_DBAAS}

# ============== Images ============================
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-operator
TAG: ${DBAAS_OPERATOR_TAG}

# ============== Namespace ============================
NAMESPACE: ${DBAAS_NAMESPACE}

# ============== RBAC ============================
restrictedEnvironment: false

# ============== Operator Mode ============================
MONITORING_ENABLED: false
DBAAS_OPERATOR_ENABLED: ${DBAAS_OPERATOR_ENABLED}
PAAS_PLATFORM: KUBERNETES

# ============== Service ============================
LOG_LEVEL: info
K8S_EVENTS_ENABLED: true
LEADER_ELECT: true
# Poll the aggregator's changed-databases feed frequently so password rotations
# propagate within seconds, keeping the rotation integration tests fast and well
# under their 2-minute wait timeout (production uses the 30s default).
DBAAS_ROTATION_POLL_INTERVAL: "2s"

# ============== Aggregator authentication ============================
# Track the same flag the aggregator uses (bootstrap/dbaas-values.yaml), so the
# operator's auth mode always matches it in integration tests. local.mk defaults
# it to false → the operator authenticates as the dbaas-operator Basic Auth user
# (the production default); set KUBERNETES_M2M_ENABLED=true to exercise M2M instead.
KUBERNETES_M2M_ENABLED: ${KUBERNETES_M2M_ENABLED}
