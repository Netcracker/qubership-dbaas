---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - namespacebindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - namespacebindings/finalizers
  verbs:
  - update
