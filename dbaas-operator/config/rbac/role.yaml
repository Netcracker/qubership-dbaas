- apiGroups:
  - dbaas.netcracker.com
  resources:
  - databaseaccesspolicies
  - externaldatabases
  - internaldatabases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - databaseaccesspolicies/status
  - databasesecretclaims/status
  - externaldatabases/status
  - internaldatabases/status
  - microservicebalancingrules/status
  - namespacebalancingrules/status
  - namespacebindings/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - databasesecretclaims
  - microservicebalancingrules
  - namespacebalancingrules
  - namespacebindings
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - databasesecretclaims/finalizers
