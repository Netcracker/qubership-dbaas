  - list
  - patch
  - watch
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - permanentbalancingrules/finalizers
  verbs:
  - update
- apiGroups:
  - dbaas.netcracker.com
  resources:
  - permanentbalancingrules/status
  verbs:
  - get
  - patch
  - update
