# Per-business-namespace onboarding bundle for the namespaced Secret RBAC model.
#
# The dbaas-operator holds NO cluster-wide Secret RBAC — it can only read/write Secrets
# in a namespace where a RoleBinding grants its ServiceAccount that access. When a business
# namespace is onboarded to an operator instance, the onboarding (the same step that creates
# the NamespaceBinding) must also create the Role + RoleBinding below.
#
# Replace the placeholders per namespace:
#   <business-namespace>  the namespace being onboarded (e.g. team-a)
#   <operator-namespace>  CLOUD_NAMESPACE of the owning operator (e.g. dbaas-op-1);
#                         this is also NamespaceBinding.spec.operatorNamespace — the single
#                         source of truth for "which operator owns this namespace"
#   <operator-sa>         the operator's ServiceAccount name (default: dbaas-operator)
---
# Declares which operator owns this namespace. The operator only reconciles CRs here
# once this binding points to it. Name must be "binding" (singleton per namespace).
apiVersion: dbaas.netcracker.com/v1
kind: NamespaceBinding
metadata:
  name: binding
  namespace: <business-namespace>
spec:
  operatorNamespace: <operator-namespace>
---
# Grants the operator's ServiceAccount Secret access in this namespace only.
# No list/watch (the operator runs no Secret informer); no delete (owned Secrets are
# garbage-collected via ownerReferences).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbaas-operator-secrets
  namespace: <business-namespace>
rules:
  - apiGroups: [ "" ]
    resources: [ secrets ]
    verbs: [ get, create, update, patch ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbaas-operator-secrets
  namespace: <business-namespace>
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dbaas-operator-secrets
subjects:
  # The operator's SA lives in the operator's namespace; a RoleBinding may bind a subject
  # from another namespace, which is exactly how each business namespace grants its owner.
  - kind: ServiceAccount
    name: <operator-sa>
    namespace: <operator-namespace>
