---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: dbpolicies.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    kind: DbPolicy
    listKind: DbPolicyList
    plural: dbpolicies
    shortNames:
    - dbbp
    singular: dbpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          DbPolicy is the Schema for the dbpolicies API.
          It declares the database role assignments for microservices in a namespace,
          applied by dbaas-aggregator when provisioning or connecting to databases.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of DbPolicy.
            properties:
              disableGlobalPermissions:
                description: |-
                  disableGlobalPermissions disables the default global permission grants that
                  dbaas-aggregator would otherwise apply to all databases of the service.
                  Set to true to opt out of global defaults and rely solely on explicit entries.
                type: boolean
              microserviceName:
                description: |-
                  microserviceName is the microservice that owns this policy.
                  Mapped to metadata.microserviceName in the DBaaS declarative payload.
                minLength: 1
                type: string
              policy:
                description: |-
                  policy defines default and additional role rules per database type. Entries here
                  act as a fallback for services not explicitly listed in the services field.
                items:
                  description: |-
                    PolicyRole defines default and additional database role rules for a specific database type.
                    Mirrors the PolicyRole Java class in the dbaas-aggregator.
                  properties:
                    additionalRole:
                      description: |-
                        additionalRole lists extra roles that may be granted beyond the defaultRole.
                        Interpretation is adapter-specific.
                      items:
                        type: string
                      type: array
                    defaultRole:
                      description: |-
                        defaultRole is the database role assigned to any microservice that is not
                        explicitly listed in the services section. Allows a baseline access level
                        for all services without individual entries.
                      minLength: 1
                      type: string
                    type:
                      description: |-
                        type is the database engine type this policy applies to, e.g. "postgresql", "mongodb".
                        Must match a type known to dbaas-aggregator.
                      minLength: 1
                      type: string
                  required:
                  - defaultRole
                  - type
                  type: object
                type: array
              services:
                description: |-
                  services defines per-microservice database role assignments. Each entry grants
                  a named microservice a specific set of database roles in this namespace.
                items:
                  description: |-
                    ServiceRole defines the database roles granted to a specific microservice.
                    Mirrors the ServiceRole Java class in the dbaas-aggregator.
                  properties:
                    name:
                      description: |-
                        name is the microservice name (must match the service's app.kubernetes.io/name label).
                        The aggregator uses this to associate role grants with the correct service identity.
                      minLength: 1
                      type: string
                    roles:
                      description: |-
                        roles is the list of database roles granted to this microservice.
                        Role names are adapter-specific, e.g. "admin", "readonly", "readwrite".
                      items:
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - name
                  - roles
                  type: object
                type: array
            required:
            - microserviceName
            type: object
          status:
            description: status defines the observed state of DbPolicy.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Condition types used by ExternalDatabase:
                    - "Ready"   — True when the resource was successfully registered with
                                  dbaas-aggregator for the current generation (reason "DatabaseRegistered").
                                  False on any error; see Reason for the error category.
                    - "Stalled" — True when the error is permanent and the controller will
                                  not retry until the spec is changed (e.g. InvalidSpec,
                                  AggregatorRejected). False for transient errors that are
                                  retried automatically (e.g. SecretError, AggregatorError,
                                  Unauthorized).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastRequestId:
                description: |-
                  lastRequestId is the X-Request-Id of the most recent reconcile attempt.
                  Use this to correlate operator logs with dbaas-aggregator logs for debugging.
                type: string
              observedGeneration:
                description: |-
                  observedGeneration reflects the .metadata.generation that was last processed
                  by the controller. When the current generation differs from this value, the
                  controller clears all conditions and starts a fresh reconciliation cycle.
                  Zero (or less than metadata.generation) means the current generation has not
                  yet been fully reconciled — for example, the controller is in BackingOff
                  waiting for a transient error to clear.
                format: int64
                type: integer
              phase:
                default: Unknown
                description: phase represents the current processing phase of the
                  resource.
                enum:
                - Unknown
                - Processing
                - WaitingForDependency
                - Succeeded
                - BackingOff
                - InvalidConfiguration
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
