---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: databasesecretclaims.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    categories:
    - dbaas
    kind: DatabaseSecretClaim
    listKind: DatabaseSecretClaimList
    plural: databasesecretclaims
    shortNames:
    - dbdsc
    singular: databasesecretclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          DatabaseSecretClaim is the Schema for the databasesecretclaims API (dbaas.netcracker.com group).
          The label app.kubernetes.io/name is required — its value is sent as originService in the
          get-by-classifier request to dbaas-aggregator. It cannot be enforced by CEL: a root-level
          XValidation rule only sees metadata.name and metadata.generateName, so referencing
          self.metadata.labels makes the API server reject the whole CRD with "undefined field 'labels'"
          (controller-gen itself generates such a rule without complaint). The same limit rules out a CEL
          check that spec.classifier.namespace equals metadata.namespace. Both are therefore enforced by a
          controller-level pre-flight check before the aggregator is called.
          It requests dbaas-aggregator to provision credentials for a managed database
          and write them into a named Kubernetes Secret in the same namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSecretClaimSpec defines the desired state of DatabaseSecretClaim.
            properties:
              classifier:
                description: classifier uniquely identifies the database whose credentials
                  this secret tracks.
                properties:
                  customKeys:
                    additionalProperties:
                      x-kubernetes-preserve-unknown-fields: true
                    description: |-
                      customKeys is an optional nested map for adapter-specific or
                      application-specific identifiers (e.g. logicalDBName).
                      Values can be any valid JSON type (string, number, boolean,
                      nested object, array). Not validated by the aggregator — passed
                      through as-is.
                    type: object
                  extraKeys:
                    additionalProperties:
                      x-kubernetes-preserve-unknown-fields: true
                    description: |-
                      extraKeys are arbitrary additional classifier identity fields flattened
                      onto the TOP level of the wire classifier, alongside microserviceName/
                      scope/namespace/tenantId (unlike customKeys, which is nested under
                      "customKeys"). They exist for compatibility with the legacy open
                      classifier model, where services could place arbitrary identity fields
                      at the classifier's top level. Values may be any JSON type (string,
                      number, boolean, nested object, array). The reserved keys
                      microserviceName, scope, namespace, tenantId and customKeys are not
                      allowed: the controller rejects such a spec with InvalidConfiguration, and
                      ClassifierFlatMap also skips them defensively so the typed fields always
                      win. (A CEL rule cannot guard this map because its values are unstructured
                      JSON, so the check lives in the controller.)
                      Because these fields are part of the database identity, every consumer's
                      dbaas-client must produce the same keys/values, otherwise the database
                      (and its mounted Secret) will not be found.
                    type: object
                  microserviceName:
                    description: microserviceName is the name of the microservice
                      that owns the database.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      namespace is the Kubernetes namespace of the owning service.
                      If omitted, the aggregator uses metadata.namespace from the request.
                      If set, it must equal the CR's metadata.namespace — a mismatch causes
                      InvalidConfiguration at the controller level.
                    type: string
                  scope:
                    description: scope defines the logical scope of the database,
                      e.g. "service" or "tenant".
                    minLength: 1
                    type: string
                  tenantId:
                    description: |-
                      tenantId is the tenant identifier for multi-tenant deployments.
                      Only relevant when scope="tenant".
                    type: string
                required:
                - microserviceName
                - scope
                type: object
                x-kubernetes-validations:
                - message: classifier is immutable after creation
                  rule: self == oldSelf
              secretName:
                description: secretName is the name of the Kubernetes Secret to create
                  or update with credentials.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: secretName is immutable after creation
                  rule: self == oldSelf
              type:
                description: type is the database engine type, e.g. "postgresql",
                  "mongodb".
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: type is immutable after creation
                  rule: self == oldSelf
              userRole:
                description: userRole is the role/permission level for the generated
                  credentials.
                type: string
                x-kubernetes-validations:
                - message: spec.userRole is immutable after creation
                  rule: self == oldSelf
            required:
            - classifier
            - secretName
            - type
            type: object
          status:
            description: DatabaseSecretClaimStatus defines the observed state of DatabaseSecretClaim.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Condition types used by all dbaas operator resources (ExternalDatabase, DatabaseAccessPolicy, InternalDatabase):
                    - "Ready"   — True when the resource was successfully processed by
                                  dbaas-aggregator for the current generation.
                                  ExternalDatabase: reason "DatabaseRegistered" on success.
                                  DatabaseAccessPolicy: reason "PolicyApplied" on success.
                                  InternalDatabase: reason "DatabaseProvisioned" on success;
                                    reason "ProvisioningStarted" while the async operation is in progress.
                                  False on any error; see Reason for the error category.
                    - "Stalled" — True when the error is permanent and the controller will
                                  not retry until the spec is changed (e.g. InvalidSpec,
                                  AggregatorRejected). False for transient errors that are
                                  retried automatically (e.g. SecretError, AggregatorError,
                                  Unauthorized, ProvisioningStarted).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              firstNotFoundAt:
                description: |-
                  firstNotFoundAt records the first time dbaas-aggregator returned
                  DatabaseNotFound (HTTP 404 + CORE-DBAAS-4006) for this CR's classifier.
                  It is set on the first 404 and cleared on any successful aggregator
                  response. The controller uses it to detect a CR that has been waiting
                  too long for its database to appear (e.g. a typo in spec.classifier)
                  and, after a fixed timeout, switches the Ready condition's reason to
                  DatabaseNotFoundTimeout and stops emitting per-cycle Warning events.
                  Polling continues so the CR can still self-heal if the database
                  eventually appears.
                format: date-time
                type: string
              lastRequestId:
                description: |-
                  lastRequestId is the X-Request-Id of the most recent reconcile attempt.
                  Use this value to correlate operator logs with dbaas-aggregator logs when
                  investigating issues for a specific resource.
                type: string
              lastRotatedAt:
                description: |-
                  lastRotatedAt records the time of the most recent connection properties
                  change applied to the target Secret. Updated only when Reconcile actually
                  changes the Secret bytes; no-op reconciles do not touch it. The controller
                  sets this both when a rotation event from dbaas-aggregator triggers the
                  change and when a safety-net poll detects drift in the aggregator's data.
                  Distinct from metadata.creationTimestamp (initial Secret creation does not
                  advance this field — see the SecretCreated vs SecretRotated event reasons).
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  observedGeneration reflects the .metadata.generation that was last processed
                  by the controller. When the current generation differs from this value, the
                  controller clears all conditions and starts a fresh reconciliation cycle.
                  Zero (or less than metadata.generation) means the current generation has not
                  yet been fully reconciled — for example, the controller is in BackingOff
                  waiting for a transient error to clear.
                format: int64
                type: integer
              phase:
                description: |-
                  phase is a human-readable summary of the conditions below, provided so that
                  `kubectl get` can show one column. Do not automate against it — read
                  conditions instead. Not defaulted by the API server: status is owned by the
                  controller, which always sets phase alongside the conditions.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
