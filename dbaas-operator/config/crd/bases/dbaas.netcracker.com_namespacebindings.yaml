---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: namespacebindings.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    categories:
    - dbaas
    kind: NamespaceBinding
    listKind: NamespaceBindingList
    plural: namespacebindings
    shortNames:
    - dbnb
    singular: namespacebinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.operatorNamespace
      name: OperatorNamespace
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          NamespaceBinding claims namespace ownership for the dbaas-operator.
          Exactly one NamespaceBinding named "binding" may exist per namespace.
          While a NamespaceBinding exists the operator will reconcile dbaas workload
          resources in that namespace.
          Deleting the NamespaceBinding releases ownership; the finalizer prevents deletion
          while blocking workload resources still exist in the namespace. While deletion
          is deferred, the Ready condition (reason BindingBlocked) lists the resource
          kinds that still block it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NamespaceBindingSpec declares the desired namespace ownership.
            properties:
              operatorNamespace:
                description: |-
                  OperatorNamespace is the Kubernetes namespace where the dbaas-operator instance
                  that owns this namespace is deployed (its CLOUD_NAMESPACE).
                  It is immutable after creation — change it by deleting and re-creating the NamespaceBinding.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.operatorNamespace is immutable after creation
                  rule: self == oldSelf
            required:
            - operatorNamespace
            type: object
          status:
            description: |-
              NamespaceBindingStatus defines the observed state of NamespaceBinding.

              Only the owning operator instance (the one whose CLOUD_NAMESPACE equals
              spec.operatorNamespace) writes this status. Foreign instances never touch the
              object, so a binding whose operatorNamespace matches no running operator
              keeps an empty status: no conditions and no observedGeneration long after
              creation mean no operator instance has claimed the binding — check
              spec.operatorNamespace for a typo.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the resource.
                  Condition types used by all dbaas operator resources (ExternalDatabase, DatabaseAccessPolicy, InternalDatabase):
                    - "Ready"   — True when the resource was successfully processed by
                                  dbaas-aggregator for the current generation.
                                  ExternalDatabase: reason "DatabaseRegistered" on success.
                                  DatabaseAccessPolicy: reason "PolicyApplied" on success.
                                  InternalDatabase: reason "DatabaseProvisioned" on success;
                                    reason "ProvisioningStarted" while the async operation is in progress.
                                  NamespaceBinding: reason "BindingRegistered" on success;
                                    reason "BindingBlocked" while deletion is deferred by
                                    remaining workload resources (the message lists their kinds).
                                  False on any error; see Reason for the error category.
                    - "Stalled" — True when the error is permanent and the controller will
                                  not retry until the spec is changed (e.g. InvalidSpec,
                                  AggregatorRejected). False for transient errors that are
                                  retried automatically (e.g. SecretError, AggregatorError,
                                  Unauthorized, ProvisioningStarted).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastRequestId:
                description: |-
                  lastRequestId is the X-Request-Id of the most recent reconcile attempt.
                  Use this value to correlate operator logs with dbaas-aggregator logs when
                  investigating issues for a specific resource.
                type: string
              observedGeneration:
                description: |-
                  observedGeneration reflects the .metadata.generation that was last processed
                  by the controller. When the current generation differs from this value, the
                  controller clears all conditions and starts a fresh reconciliation cycle.
                  Zero (or less than metadata.generation) means the current generation has not
                  yet been fully reconciled — for example, the controller is in BackingOff
                  waiting for a transient error to clear.
                format: int64
                type: integer
              phase:
                description: |-
                  phase is a human-readable summary of the conditions below, provided so that
                  `kubectl get` can show one column. Do not automate against it — read
                  conditions instead. Not defaulted by the API server: status is owned by the
                  controller, which always sets phase alongside the conditions.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: NamespaceBinding name must be 'binding'
          rule: self.metadata.name == 'binding'
    served: true
    storage: true
    subresources:
      status: {}
