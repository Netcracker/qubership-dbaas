# ExternalDatabaseDeclaration — Secret does not exist.
# Expected: phase=BackingOff, Registered=False (SecretError).
# The controller retries until the Secret is created.
apiVersion: dbaas.netcracker.com/v1alpha1
kind: ExternalDatabaseDeclaration
metadata:
  name: missing-secret-test
  namespace: test-ns
spec:
  type: postgresql
  dbName: ghostdb
  classifier:
    namespace: test-ns
    microserviceName: ghost-service
    scope: service
  connectionProperties:
    - role: admin
      extraProperties:
        host: pg.example.com
        port: "5432"
      credentialsSecretRef:
        name: does-not-exist
        keys:
          - key: username
            name: username
          - key: password
            name: password
