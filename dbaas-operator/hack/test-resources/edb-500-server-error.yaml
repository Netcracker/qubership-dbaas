apiVersion: dbaas.netcracker.com/v1alpha1
kind: ExternalDatabaseDeclaration
metadata:
  name: edb-500
  namespace: test-ns
spec:
  classifier:
    microserviceName: test-service
    namespace: test-ns
    scope: service
  type: postgresql
  # dbName "db-500" is mapped to HTTP 500 in aggregator-mock-rules ConfigMap.
  # Expected phase: BackingOff / reason: AggregatorError (transient server error — retries)
  dbName: db-500
  connectionProperties:
    - role: admin
      url: jdbc:postgresql://pg.example.com:5432/db-500
