apiVersion: dbaas.netcracker.com/v1alpha1
kind: DbPolicy
metadata:
  name: dp-success
spec:
  # microserviceName has no matching rule in apply-rules.json → mock returns 200 COMPLETED
  microserviceName: svc-ok
  services:
    - name: other-service
      roles:
        - admin
        - readonly
  policy:
    - type: postgresql
      defaultRole: admin
      additionalRole:
        - readonly
