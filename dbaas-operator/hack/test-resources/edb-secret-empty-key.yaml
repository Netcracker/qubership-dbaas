# ExternalDatabase — Secret exists and contains the required keys,
# but the username value is an empty string.
#
# Expected: phase=BackingOff, Ready=False (SecretError), Stalled=False.
# Condition message: "key "username" is empty"
# Event reason: SecretError  (NOT Unauthorized — the aggregator is never called).
#
# The controller retries automatically; as soon as the Secret is updated
# with a real username the next reconcile will succeed.
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-credentials-empty-username
  namespace: test-ns
stringData:
  username: ""
  password: "s3cr3t"
---
apiVersion: dbaas.netcracker.com/v1
kind: ExternalDatabase
metadata:
  name: edb-secret-empty-key
  namespace: test-ns
spec:
  type: postgresql
  dbName: mydb-empty-key
  classifier:
    namespace: test-ns
    microserviceName: edb-secret-empty-key
    scope: service
  connectionProperties:
    - role: admin
      extraProperties:
        host: pg.example.com
        port: "5432"
      credentialsSecretRef:
        name: pg-credentials-empty-username
        keys:
          - key: username
            name: username
          - key: password
            name: password
