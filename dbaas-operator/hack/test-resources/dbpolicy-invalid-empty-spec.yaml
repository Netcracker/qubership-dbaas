apiVersion: dbaas.netcracker.com/v1alpha1
kind: DbPolicy
metadata:
  name: dp-invalid-empty-spec
spec:
  # Neither services nor policy are set — CRD allows it (both fields are +optional),
  # but the controller requires at least one to be non-empty.
  # Expected: Phase=InvalidConfiguration, Stalled=True, reason=InvalidSpec (no requeue, no aggregator call)
  microserviceName: svc-invalid-empty-spec
