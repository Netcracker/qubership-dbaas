# ExternalDatabaseDeclaration — happy path.
# connectionProperties has two entries:
#   1. admin role with credentials from a Secret
#   2. readonly role with a pre-built URL (no Secret)
apiVersion: dbaas.netcracker.com/v1alpha1
kind: ExternalDatabaseDeclaration
metadata:
  name: my-postgres
  namespace: test-ns
spec:
  type: postgresql
  dbName: mydb
  classifier:
    namespace: test-ns
    microserviceName: my-service
    scope: service
  updateConnectionProperties: false
  connectionProperties:
    - role: admin
      host: pg.example.com
      port: "5432"
      authDbName: mydb
      credentialsSecretRef:
        name: pg-credentials
        usernameKey: username
        passwordKey: password
      extraProperties:
        sslMode: require
    - role: readonly
      url: jdbc:postgresql://pg-ro.example.com:5432/mydb
