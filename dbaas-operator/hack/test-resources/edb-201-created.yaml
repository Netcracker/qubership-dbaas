apiVersion: dbaas.netcracker.com/v1alpha1
kind: ExternalDatabaseDeclaration
metadata:
  name: edb-201
  namespace: test-ns
spec:
  classifier:
    microserviceName: test-service
    namespace: test-ns
    scope: service
  type: postgresql
  # dbName "db-201" is mapped to HTTP 201 in aggregator-mock-rules ConfigMap.
  # Expected phase: Updated (201 = successfully registered)
  dbName: db-201
  connectionProperties:
    - role: admin
      url: jdbc:postgresql://pg.example.com:5432/db-201
