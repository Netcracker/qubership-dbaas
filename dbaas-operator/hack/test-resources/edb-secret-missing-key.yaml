# ExternalDatabaseDeclaration — Secret exists but is missing the required key.
# Expected: phase=BackingOff, Registered=False (SecretError),
#           condition message contains "missing key".
# The controller retries; as soon as the key is added to the Secret
# the next reconcile will succeed.
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-credentials-incomplete
  namespace: test-ns
stringData:
  irrelevant-key: irrelevant-value
---
apiVersion: dbaas.netcracker.com/v1alpha1
kind: ExternalDatabaseDeclaration
metadata:
  name: secret-missing-key-test
  namespace: test-ns
spec:
  type: postgresql
  dbName: mydb
  classifier:
    namespace: test-ns
    microserviceName: my-service
    scope: service
  connectionProperties:
    - role: admin
      host: pg.example.com
      port: "5432"
      credentialsSecretRef:
        name: pg-credentials-incomplete
