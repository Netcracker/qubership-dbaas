apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbaas-operator
  namespace: dbaas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dbaas-operator
rules:
  # dbaas CRs
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - databasedeclarations
      - dbpolicies
      - externaldatabasedeclarations
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - databasedeclarations/status
      - dbpolicies/status
      - externaldatabasedeclarations/status
    verbs: [get, update, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - databasedeclarations/finalizers
      - dbpolicies/finalizers
      - externaldatabasedeclarations/finalizers
    verbs: [update]
  # Secrets (for credentials in ExternalDatabaseDeclaration)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dbaas-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dbaas-operator
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-operator
  namespace: dbaas-system
  labels:
    app: dbaas-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-operator
  template:
    metadata:
      labels:
        app: dbaas-operator
    spec:
      serviceAccountName: dbaas-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: dbaas-operator:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --watch-namespaces=test-ns
            - --leader-elect
          env:
            # Directory containing users.json — mirrors DBAAS_SECURITY_CONFIGURATION_LOCATION
            # used by the real dbaas-aggregator. The pod will not start until the Secret exists.
            - name: DBAAS_SECURITY_CONFIGURATION_LOCATION
              value: /etc/dbaas/security
            # Which user from users.json the operator authenticates as.
            # Must have DB_CLIENT role in dbaas-aggregator.
            - name: DBAAS_AGGREGATOR_USERNAME
              value: cluster-dba
          volumeMounts:
            - name: security
              mountPath: /etc/dbaas/security
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: security
          secret:
            secretName: dbaas-security-configuration-secret
