apiVersion: v1
kind: Namespace
metadata:
  name: dbaas-system
---
# Mirrors the Secret created by the dbaas-aggregator Helm chart.
# Name, key, and JSON format match exactly so the operator can read
# the same Secret when deployed alongside the real dbaas-aggregator.
#
# In production this Secret is generated by the dbaas-aggregator Helm chart
# from DBAAS_CLUSTER_DBA_CREDENTIALS_* Helm values. Here it is created manually
# for kind-based local testing.
apiVersion: v1
kind: Secret
metadata:
  name: dbaas-security-configuration-secret
  namespace: dbaas-system
stringData:
  users.json: |
    {
      "cluster-dba": {
        "password": "changeme",
        "roles": ["NAMESPACE_CLEANER", "DB_CLIENT", "MIGRATION_CLIENT"]
      },
      "dbaas-tenant": {
        "password": "changeme-tenant",
        "roles": ["NAMESPACE_CLEANER", "DB_CLIENT"]
      }
    }
---
# Per-dbName response rules for aggregator-mock.
# Format: { "<dbName>": { "httpCode": <int>, "tmfCode": "<CORE-DBAAS-XXXX>", "reason": "...", "message": "..." } }
# The mock looks up the dbName from the request body and returns the mapped httpCode
# with a TmfErrorResponse body built entirely from the fields in this file.
# There are no hardcoded templates in the mock binary — this ConfigMap is the single
# source of truth for every response.
# Falls back to MOCK_RESPONSE_CODE (default: 200) when no rule matches.
# Edit this ConfigMap with kubectl and restart the deployment to apply changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aggregator-mock-rules
  namespace: dbaas-system
data:
  rules.json: |
    {
      "db-201": {"httpCode": 201},
      "db-400": {
        "httpCode": 400,
        "tmfCode": "CORE-DBAAS-4010",
        "reason": "Invalid classifier",
        "message": "Invalid classifier. Field 'type' has invalid value."
      },
      "db-401": {
        "httpCode": 401,
        "message": "Requested role is not allowed"
      },
      "db-403": {
        "httpCode": 403,
        "tmfCode": "CORE-DBAAS-4004",
        "reason": "Namespace from request is not equal to one from database classifier",
        "message": "Namespace from request is not equal to one from database classifier."
      },
      "db-409": {
        "httpCode": 409,
        "tmfCode": "CORE-DBAAS-4002",
        "reason": "Conflict database request",
        "message": "Conflict database request. Logical database with such classifier already exists and is not externally manageable."
      },
      "db-500": {
        "httpCode": 500,
        "tmfCode": "CORE-DBAAS-2000",
        "reason": "Unexpected exception",
        "message": "Unexpected exception"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-aggregator
  namespace: dbaas-system
  labels:
    app: dbaas-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-aggregator
  template:
    metadata:
      labels:
        app: dbaas-aggregator
    spec:
      containers:
        - name: dbaas-aggregator
          image: aggregator-mock:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # Directory containing users.json — mirrors DBAAS_SECURITY_CONFIGURATION_LOCATION
            # used by the real dbaas-aggregator.
            - name: DBAAS_SECURITY_CONFIGURATION_LOCATION
              value: /etc/dbaas/security
            # Global fallback code when no per-dbName rule matches.
            - name: MOCK_RESPONSE_CODE
              value: "200"
            - name: MOCK_RULES_FILE
              value: /config/rules.json
          volumeMounts:
            - name: security
              mountPath: /etc/dbaas/security
              readOnly: true
            - name: rules
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: security
          secret:
            secretName: dbaas-security-configuration-secret
        - name: rules
          configMap:
            name: aggregator-mock-rules
---
apiVersion: v1
kind: Service
metadata:
  name: dbaas-aggregator
  namespace: dbaas-system
spec:
  selector:
    app: dbaas-aggregator
  ports:
    - port: 8080
      targetPort: 8080
