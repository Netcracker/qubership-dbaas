apiVersion: v1
kind: Namespace
metadata:
  name: dbaas-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator-mock
  namespace: dbaas-system
  labels:
    app: aggregator-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator-mock
  template:
    metadata:
      labels:
        app: aggregator-mock
    spec:
      containers:
        - name: aggregator-mock
          image: aggregator-mock:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # Set MOCK_RESPONSE_CODE=400 or 500 to simulate error paths.
            - name: MOCK_RESPONSE_CODE
              value: "200"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aggregator-mock
  namespace: dbaas-system
spec:
  selector:
    app: aggregator-mock
  ports:
    - port: 8080
      targetPort: 8080
