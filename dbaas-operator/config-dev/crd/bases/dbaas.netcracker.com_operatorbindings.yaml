---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: operatorbindings.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    kind: OperatorBinding
    listKind: OperatorBindingList
    plural: operatorbindings
    shortNames:
    - ob
    singular: operatorbinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.location
      name: Location
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          OperatorBinding claims namespace ownership for the dbaas-operator.
          Exactly one OperatorBinding named "registration" may exist per namespace.
          While an OperatorBinding exists the operator will reconcile dbaas workload
          resources (ExternalDatabase, DatabaseDeclaration, DbPolicy) in that namespace.
          Deleting the OperatorBinding releases ownership; the finalizer prevents deletion
          while blocking workload resources still exist in the namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OperatorBindingSpec declares the desired namespace ownership.
            properties:
              location:
                description: |-
                  Location is the logical location (e.g. cloud namespace name) that this binding
                  registers with dbaas-aggregator.  It is immutable after creation — change it by
                  deleting and re-creating the OperatorBinding.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: spec.location is immutable after creation
                  rule: self == oldSelf
            required:
            - location
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: OperatorBinding name must be 'registration'
          rule: self.metadata.name == 'registration'
    served: true
    storage: true
    subresources: {}
