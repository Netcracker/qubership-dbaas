# InternalDatabase — controller pre-flight rejects approach=clone without sourceClassifier
# No aggregator call is made — the controller catches this before sending the request.
# Expected: Phase=InvalidConfiguration/InvalidSpec, Stalled=True (no requeue)
apiVersion: dbaas.netcracker.com/v1
kind: InternalDatabase
metadata:
  name: idb-invalid-no-source
  namespace: test-ns
spec:
  classifier:
      microserviceName: idb-svc-nosrc
      scope: service
  type: postgresql
  initialInstantiation:
    approach: clone
