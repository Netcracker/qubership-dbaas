# DatabaseDeclaration — async submit succeeds but provisioning fails during polling
# No apply-rule → default 202 with trackingId="tracking-dd-poll-failed"
# poll-rules.json key: "tracking-dd-poll-failed" → FAILED / "disk quota exceeded"
# Expected: Phase=WaitingForDependency → Phase=InvalidConfiguration/AggregatorRejected, Stalled=True
apiVersion: dbaas.netcracker.com/v1
kind: DatabaseDeclaration
metadata:
  name: dd-poll-failed
  namespace: test-ns
spec:
  classifier:
      microserviceName: dd-poll-failed
      scope: service
  type: postgresql
