# Namespaced Secret RBAC for the dev/kind environment, mirroring the production model:
# the operator holds no cluster-wide Secret access, so each namespace it works in must
# grant its ServiceAccount Secret access via a Role + RoleBinding.

# ── Business namespace test-ns ────────────────────────────────────────────────
# Provisioned alongside test-ns's NamespaceBinding (see namespacebinding.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbaas-operator-secrets
  namespace: test-ns
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbaas-operator-secrets
  namespace: test-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dbaas-operator-secrets
subjects:
  # The operator's ServiceAccount lives in dbaas-system; a RoleBinding may bind a subject
  # from another namespace, which is how test-ns grants its owning operator Secret access.
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
