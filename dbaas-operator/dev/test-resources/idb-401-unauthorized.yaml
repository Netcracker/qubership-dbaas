# InternalDatabase — aggregator rejects with HTTP 401
# apply-rules.json key: "idb-svc-401" → httpCode=401
# Expected: Phase=BackingOff, Ready=False/Unauthorized, Stalled=False (retries)
apiVersion: dbaas.netcracker.com/v1
kind: InternalDatabase
metadata:
  name: idb-401-unauthorized
  namespace: test-ns
spec:
  classifier:
      microserviceName: idb-svc-401
      scope: service
  type: postgresql
