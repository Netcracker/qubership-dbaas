# ExternalDatabase — happy path.
# connectionProperties has two entries:
#   1. admin role with credentials from a Secret
#   2. readonly role with a pre-built URL (no Secret)
apiVersion: dbaas.netcracker.com/v1
kind: ExternalDatabase
metadata:
  name: my-postgres
  namespace: test-ns
spec:
  type: postgresql
  dbName: mydb
  classifier:
    namespace: test-ns
    microserviceName: my-service
    scope: service
  connectionProperties:
    - role: admin
      credentialsSecretRef:
        name: pg-credentials
        keys:
          - key: username
            name: username
          - key: password
            name: password
      extraProperties:
        host: pg.example.com
        port: "5432"
        authDbName: mydb
        sslMode: require
    - role: readonly
      extraProperties:
        url: jdbc:postgresql://pg-ro.example.com:5432/mydb
