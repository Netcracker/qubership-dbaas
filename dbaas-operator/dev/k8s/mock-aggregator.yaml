apiVersion: v1
kind: Namespace
metadata:
  name: dbaas-system
---
# Per-dbName response rules for aggregator-mock.
# Format: { "<dbName>": { "httpCode": <int>, "tmfCode": "<CORE-DBAAS-XXXX>", "reason": "...", "message": "..." } }
# The mock looks up the dbName from the request body and returns the mapped httpCode
# with a TmfErrorResponse body built entirely from the fields in this file.
# There are no hardcoded templates in the mock binary — this ConfigMap is the single
# source of truth for every response.
# Falls back to MOCK_RESPONSE_CODE (default: 200) when no rule matches.
# Edit this ConfigMap with kubectl and restart the deployment to apply changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aggregator-mock-rules
  namespace: dbaas-system
data:
  rules.json: |
    {
      "db-201": {"httpCode": 201},
      "db-400": {
        "httpCode": 400,
        "tmfCode": "CORE-DBAAS-4010",
        "reason": "Invalid classifier",
        "message": "Invalid classifier. Field 'type' has invalid value."
      },
      "db-401": {
        "httpCode": 401,
        "message": "Requested role is not allowed"
      },
      "db-403": {
        "httpCode": 403,
        "tmfCode": "CORE-DBAAS-4004",
        "reason": "Namespace from request is not equal to one from database classifier",
        "message": "Namespace from request is not equal to one from database classifier."
      },
      "db-409": {
        "httpCode": 409,
        "tmfCode": "CORE-DBAAS-4002",
        "reason": "Conflict database request",
        "message": "Conflict database request. Logical database with such classifier already exists and is not externally manageable."
      },
      "db-500": {
        "httpCode": 500,
        "tmfCode": "CORE-DBAAS-2000",
        "reason": "Unexpected exception",
        "message": "Unexpected exception"
      }
    }
  apply-rules.json: |
    {
      "svc-400": {
        "httpCode": 400,
        "tmfCode": "CORE-DBAAS-4036",
        "reason": "Declarative configuration request validation failed",
        "message": "Declarative configuration validation failed. Unknown kind."
      },
      "svc-401": {
        "httpCode": 401,
        "message": "Requested role is not allowed"
      },
      "svc-500": {
        "httpCode": 500,
        "tmfCode": "CORE-DBAAS-2000",
        "reason": "Unexpected exception",
        "message": "Unexpected exception"
      },
      "idb-svc-sync": {
        "httpCode": 200
      },
      "idb-svc-400": {
        "httpCode": 400,
        "tmfCode": "CORE-DBAAS-4036",
        "reason": "Declarative configuration request validation failed",
        "message": "Declarative configuration validation failed. Unknown dbType."
      },
      "idb-svc-401": {
        "httpCode": 401,
        "message": "Requested role is not allowed"
      },
      "idb-svc-500": {
        "httpCode": 500,
        "tmfCode": "CORE-DBAAS-2000",
        "reason": "Unexpected exception",
        "message": "Unexpected exception"
      }
    }
  poll-rules.json: |
    {
      "tracking-idb-poll-failed": {
        "status": "FAILED",
        "failReason": "disk quota exceeded on host pg-primary-0"
      },
      "tracking-idb-poll-terminated": {
        "status": "TERMINATED"
      }
    }
  # Rotation feed for GET /api/v3/dbaas/databases/changed. A JSON array of databases
  # whose credentials "changed". The seed (since-less) call reports no history, so the
  # operator's rotation poller seeds at epoch and replays these entries once — waking
  # every DatabaseSecretClaim whose (classifier, type) matches. The entry below matches
  # dev/test-resources/dsc-success.yaml.
  changed.json: |
    [
      {
        "id": "11111111-1111-1111-1111-111111111111",
        "namespace": "test-ns",
        "type": "postgresql",
        "lastRotatedAt": "2026-06-18T10:00:00Z",
        "classifier": {
          "microserviceName": "secret-svc",
          "scope": "service",
          "namespace": "test-ns"
        }
      }
    ]
  # Connection properties returned by POST .../databases/get-by-classifier/{type},
  # keyed by originService (the app.kubernetes.io/name label on the DatabaseSecretClaim).
  # Edit a password here and restart the deployment to make the next rotation fan-out
  # (or safety-net re-poll) surface a real SecretRotated; the value is otherwise stable
  # so a re-fetch is a content-aware no-op (SecretUpToDate).
  get-by-classifier.json: |
    {
      "secret-svc": {
        "host": "pg.example.com",
        "port": 5432,
        "name": "secret_db",
        "username": "secret_user",
        "password": "rotate-me-v1",
        "url": "jdbc:postgresql://pg.example.com:5432/secret_db",
        "role": "admin"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-aggregator
  namespace: dbaas-system
  labels:
    app: dbaas-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-aggregator
  template:
    metadata:
      labels:
        app: dbaas-aggregator
    spec:
      containers:
        - name: dbaas-aggregator
          image: aggregator-mock:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # Global fallback code when no per-dbName rule matches.
            - name: MOCK_RESPONSE_CODE
              value: "200"
            - name: MOCK_RULES_FILE
              value: /config/rules.json
            - name: MOCK_APPLY_RULES_FILE
              value: /config/apply-rules.json
            - name: MOCK_POLL_RULES_FILE
              value: /config/poll-rules.json
            - name: MOCK_CHANGED_FILE
              value: /config/changed.json
            - name: MOCK_GETBYCLASSIFIER_FILE
              value: /config/get-by-classifier.json
          volumeMounts:
            - name: rules
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: rules
          configMap:
            name: aggregator-mock-rules
---
apiVersion: v1
kind: Service
metadata:
  name: dbaas-aggregator
  namespace: dbaas-system
spec:
  selector:
    app: dbaas-aggregator
  ports:
    - port: 8080
      targetPort: 8080
