apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbaas-operator
  namespace: dbaas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dbaas-operator
rules:
  # dbaas CRs (read-only for workloads whose main resource the operator never mutates).
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - internaldatabases
      - databaseaccesspolicies
      - externaldatabases
    verbs: [get, list, watch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - internaldatabases/status
      - databasesecretclaims/status
      - databaseaccesspolicies/status
      - externaldatabases/status
    verbs: [get, update, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - microservicebalancingrules
      - namespacebalancingrules
      - permanentbalancingrules
    verbs: [get, list, watch, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - microservicebalancingrules/status
      - namespacebalancingrules/status
      - permanentbalancingrules/status
    verbs: [get, update, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - microservicebalancingrules/finalizers
      - namespacebalancingrules/finalizers
      - permanentbalancingrules/finalizers
    verbs: [update]
  # namespacebindings: patch is required to add/remove the protection finalizer (client.MergeFrom).
  # update on /finalizers is the additional Kubernetes check when metadata.finalizers changes.
  # databasesecretclaims / namespacebindings: patch on the main resource is needed —
  # databasesecretclaims for the rotation-trigger annotation, namespacebindings for
  # the protection finalizer (client.MergeFrom).
  - apiGroups: [dbaas.netcracker.com]
    resources: [databasesecretclaims, namespacebindings]
    verbs: [get, list, watch, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources: [namespacebindings/finalizers]
    verbs: [update]
  # Secrets: list+watch for WatchesMetadata, get for reconcile reads,
  # create/update/patch for DatabaseSecretClaim materialization.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dbaas-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dbaas-operator
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbaas-operator
  namespace: dbaas-system
rules:
  # Leader election — leases are always in the operator's own namespace
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Event recording
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbaas-operator
  namespace: dbaas-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dbaas-operator
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
---
# Basic Auth credentials for the operator (Basic mode, the default). Mirrors the
# aggregator's dbaas-security-configuration-secret: a users.json with the dbaas-operator
# user. The aggregator-mock does not validate the password, so any value works here;
# the operator only needs to read its own password to send it. In M2M mode the operator
# ignores this Secret (it authenticates with the projected SA token instead).
apiVersion: v1
kind: Secret
metadata:
  name: dbaas-security-configuration-secret
  namespace: dbaas-system
type: Opaque
stringData:
  users.json: |
    {
      "dbaas-operator": {
        "password": "dev-password",
        "roles": ["DB_CLIENT", "CLUSTER_OPERATOR"]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-operator
  namespace: dbaas-system
  labels:
    app: dbaas-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-operator
  template:
    metadata:
      labels:
        app: dbaas-operator
    spec:
      serviceAccountName: dbaas-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Both auth sources are mounted; the KUBERNETES_M2M_ENABLED env var below selects
      # which one the operator actually uses (basic → the Secret, m2m → the token).
      volumes:
        - name: projected-tokens
          projected:
            defaultMode: 292
            sources:
              - serviceAccountToken:
                  path: dbaas/token
                  audience: dbaas
                  expirationSeconds: 600
        - name: dbaas-security-volume
          secret:
            secretName: dbaas-security-configuration-secret
      containers:
        - name: manager
          image: dbaas-operator:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          env:
            - name: CLOUD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Aggregator auth mode. Defaults to basic (false); kind-up.sh substitutes
            # KUBERNETES_M2M_ENABLED to flip the operator onto the M2M Bearer-token path.
            - name: KUBERNETES_M2M_ENABLED
              value: "${KUBERNETES_M2M_ENABLED}"
            # Basic Auth (m2m=false): which user to read from the mounted security Secret.
            - name: DBAAS_AGGREGATOR_USERNAME
              value: dbaas-operator
            - name: DBAAS_SECURITY_CONFIGURATION_LOCATION
              value: /etc/dbaas/security
          # Run the binary THROUGH the base image's ENTRYPOINT (/usr/bin/entrypoint.sh),
          # which loads the Kubernetes service-account ca.crt into the trust store before
          # exec'ing its args, so any outbound TLS (e.g. an HTTPS aggregator URL) trusts the
          # cluster CA — bypassing the entrypoint fails with x509: certificate signed by
          # unknown authority.
          command:
            - /usr/bin/entrypoint.sh
          args:
            - /app/dbaas-operator
            - --health-probe-bind-address=:8081
            - --http-bind-address=:8080
            - --leader-elect
          volumeMounts:
            - name: projected-tokens
              mountPath: /var/run/secrets/tokens
              readOnly: true
            - name: dbaas-security-volume
              mountPath: /etc/dbaas/security
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
