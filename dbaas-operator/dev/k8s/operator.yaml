apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbaas-operator
  namespace: dbaas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dbaas-operator
rules:
  # dbaas CRs (read-only for workloads whose main resource the operator never mutates).
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - internaldatabases
      - databaseaccesspolicies
      - externaldatabases
    verbs: [get, list, watch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - internaldatabases/status
      - databasesecrets/status
      - databaseaccesspolicies/status
      - externaldatabases/status
    verbs: [get, update, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - dbmicroservicebalancingrules
      - dbpermanentbalancingrules
    verbs: [get, list, watch, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - dbnamespacebalancingrules
    verbs: [get, list, watch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - dbmicroservicebalancingrules/status
      - dbnamespacebalancingrules/status
      - dbpermanentbalancingrules/status
    verbs: [get, update, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources:
      - dbmicroservicebalancingrules/finalizers
      - dbpermanentbalancingrules/finalizers
    verbs: [update]
  # namespacebindings: patch is required to add/remove the protection finalizer (client.MergeFrom).
  # update on /finalizers is the additional Kubernetes check when metadata.finalizers changes.
  # databasesecrets / namespacebindings: patch on the main resource is needed —
  # databasesecrets for the rotation-trigger annotation, namespacebindings for
  # the protection finalizer (client.MergeFrom).
  - apiGroups: [dbaas.netcracker.com]
    resources: [databasesecrets, namespacebindings]
    verbs: [get, list, watch, patch]
  - apiGroups: [dbaas.netcracker.com]
    resources: [namespacebindings/finalizers]
    verbs: [update]
  # Secrets: list+watch for WatchesMetadata, get for reconcile reads,
  # create/update/patch for DatabaseSecret materialization.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch]
  # OIDC discovery for the rotation webhook's token verifier (see internal/webhook).
  - nonResourceURLs: [/.well-known/openid-configuration, /openid/v1/jwks]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dbaas-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dbaas-operator
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dbaas-operator
  namespace: dbaas-system
rules:
  # Leader election — leases are always in the operator's own namespace
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Event recording
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dbaas-operator
  namespace: dbaas-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dbaas-operator
subjects:
  - kind: ServiceAccount
    name: dbaas-operator
    namespace: dbaas-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-operator
  namespace: dbaas-system
  labels:
    app: dbaas-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-operator
  template:
    metadata:
      labels:
        app: dbaas-operator
    spec:
      serviceAccountName: dbaas-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: projected-tokens
          projected:
            defaultMode: 292
            sources:
              - serviceAccountToken:
                  path: dbaas/token
                  audience: dbaas
                  expirationSeconds: 600
      containers:
        - name: manager
          image: dbaas-operator:dev
          imagePullPolicy: Never   # image is loaded into kind locally
          env:
            - name: CLOUD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # Run the binary THROUGH the base image's ENTRYPOINT (/usr/bin/entrypoint.sh),
          # which loads the Kubernetes service-account ca.crt into the trust store before
          # exec'ing its args. The rotation webhook's OIDC verifier makes a TLS call to the
          # kube-apiserver via the system trust store, so the CA must be loaded — bypassing
          # the entrypoint fails with x509: certificate signed by unknown authority.
          command:
            - /usr/bin/entrypoint.sh
          args:
            - /app/dbaas-operator
            - --health-probe-bind-address=:8081
            - --http-bind-address=:8080
            - --leader-elect
          volumeMounts:
            - name: projected-tokens
              mountPath: /var/run/secrets/tokens
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
