{{- if and .Values.DBAAS_OPERATOR_ENABLED (not .Values.KUBERNETES_M2M_ENABLED) }}
{{- $password := required "DBAAS_OPERATOR_CREDENTIALS_PASSWORD must be set when KUBERNETES_M2M_ENABLED=false (operator Basic Auth mode)" .Values.DBAAS_OPERATOR_CREDENTIALS_PASSWORD }}
# Basic Auth credentials the operator uses for dbaas-aggregator. Created only in
# Basic Auth mode (KUBERNETES_M2M_ENABLED=false); mounted at /etc/dbaas/security.
# The username/password must match the user provisioned on the aggregator side
# (its DBAAS_OPERATOR_CREDENTIALS_*), which carries the DB_CLIENT and CLUSTER_OPERATOR roles.
apiVersion: v1
kind: Secret
metadata:
  name: '{{ .Values.SERVICE_NAME }}-aggregator-credentials'
  labels:
    name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'dbaas'
    app.kubernetes.io/component: 'operator'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    deployment.netcracker.com/sessionId: {{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}
type: Opaque
stringData:
  username: '{{ .Values.DBAAS_OPERATOR_CREDENTIALS_USERNAME | default "dbaas-operator" }}'
  password: {{ $password | quote }}
{{- end }}
