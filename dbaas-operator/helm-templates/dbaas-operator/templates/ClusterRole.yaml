{{- if and .Values.DBAAS_OPERATOR_ENABLED (not .Values.restrictedEnvironment) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}'
rules:
  # dbaas CRs
  # internaldatabases: operator reads and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ internaldatabases ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ internaldatabases/status ]
    verbs: [ get, update, patch ]
  # databaseaccesspolicies: operator reads and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databaseaccesspolicies ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databaseaccesspolicies/status ]
    verbs: [ get, update, patch ]
  # databasesecretclaims: operator reads and watches; creates/updates the target core v1.Secret; status via /status subresource.
  # patch on the resource itself is required for the rotation poller to stamp the
  # dbaas.netcracker.com/rotation-trigger annotation on matched CRs.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databasesecretclaims ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databasesecretclaims/status ]
    verbs: [ get, update, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databasesecretclaims/finalizers ]
    verbs: [ update ]
  # balancing rule CRs: operator reads and watches list-based singleton rules and
  # requires patch/finalizer permissions for cleanup on deletion.
  # NOTE: permanentbalancingrules are intentionally absent here. They are an
  # operator-namespace-only resource (the informer is scoped to the operator
  # namespace), so their RBAC is namespaced and lives in Role.yaml — no ClusterRole.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules, namespacebalancingrules ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules/status, namespacebalancingrules/status ]
    verbs: [ get, update, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules/finalizers, namespacebalancingrules/finalizers ]
    verbs: [ update ]
  # externaldatabases: operator only reads (Get/List) and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ externaldatabases ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ externaldatabases/status ]
    verbs: [ get, update, patch ]
  # namespacebindings: patch is required to add/remove the protection finalizer (client.MergeFrom).
  # update on /finalizers is the additional Kubernetes check when metadata.finalizers changes.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ namespacebindings ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ namespacebindings/finalizers ]
    verbs: [ update ]
  # No Secret rule here: the operator holds NO cluster-wide Secret RBAC. Secret access is granted
  # per namespace by a dbaas-operator-secrets Role + RoleBinding provisioned alongside that
  # namespace's NamespaceBinding (see config/samples/namespaced-secret-rbac.yaml). The operator
  # reads its own aggregator credentials from a mounted volume, not the API.
{{- end }}
