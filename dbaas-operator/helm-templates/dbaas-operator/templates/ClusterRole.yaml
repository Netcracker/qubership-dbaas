{{- if and .Values.DBAAS_OPERATOR_ENABLED (not .Values.restrictedEnvironment) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'dbaas'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
rules:
  # dbaas CRs
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabases
      - namespacebindings
    verbs: [ get, list, watch, create, update, patch, delete ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabases/status
    verbs: [ get, update, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabases/finalizers
      - namespacebindings/finalizers
    verbs: [ update ]
  # Secrets (for credentials in ExternalDatabase)
  # Secrets are fetched directly from the API server on each reconcile (no cache).
  # list and watch are not required.
  - apiGroups: [ "" ]
    resources: [ secrets ]
    verbs: [ get ]
{{- end }}
