{{- if and .Values.DBAAS_OPERATOR_ENABLED (not .Values.restrictedEnvironment) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}'
rules:
  # dbaas CRs
  # internaldatabases: operator reads and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ internaldatabases ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ internaldatabases/status ]
    verbs: [ get, update, patch ]
  # databaseaccesspolicies: operator reads and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databaseaccesspolicies ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databaseaccesspolicies/status ]
    verbs: [ get, update, patch ]
  # databasesecrets: operator reads and watches; creates/updates the target core v1.Secret; status via /status subresource.
  # patch on the resource itself is required for the rotation webhook to stamp the
  # dbaas.netcracker.com/rotation-trigger annotation on matched CRs.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databasesecrets ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ databasesecrets/status ]
    verbs: [ get, update, patch ]
  # balancing rule CRs: operator reads and watches list-based singleton rules and
  # requires patch/finalizer permissions for cleanup on deletion.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules, namespacebalancingrules, permanentbalancingrules ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules/status, namespacebalancingrules/status, permanentbalancingrules/status ]
    verbs: [ get, update, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ microservicebalancingrules/finalizers, namespacebalancingrules/finalizers, permanentbalancingrules/finalizers ]
    verbs: [ update ]
  # externaldatabases: operator only reads (Get/List) and watches; status is updated via the /status subresource.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ externaldatabases ]
    verbs: [ get, list, watch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ externaldatabases/status ]
    verbs: [ get, update, patch ]
  # namespacebindings: patch is required to add/remove the protection finalizer (client.MergeFrom).
  # update on /finalizers is the additional Kubernetes check when metadata.finalizers changes.
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ namespacebindings ]
    verbs: [ get, list, watch, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources: [ namespacebindings/finalizers ]
    verbs: [ update ]
  # Secrets (for credentials in ExternalDatabase, create/update/patch for DatabaseSecret materialization)
  # list + watch required for WatchesMetadata (ExternalDatabase, secret rotation watch), list required for pre-flight sibling check(DatabaseSecret); get required for reconcile reads.
  - apiGroups: [ "" ]
    resources: [ secrets ]
    verbs: [ get, list, create, update, patch, watch ]
  # OIDC discovery: the rotation webhook validates inbound aggregator tokens by
  # fetching the cluster's OIDC configuration and JWKS (see internal/webhook).
  # Hardened clusters do not grant these non-resource URLs to all service
  # accounts, so request them explicitly.
  - nonResourceURLs: [ /.well-known/openid-configuration, /openid/v1/jwks ]
    verbs: [ get ]
{{- end }}
