{{- if and .Values.INSTALL_DBAAS_OPERATOR (not .Values.RESTRICTED_ENVIRONMENT) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'dbaas'
    app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
rules:
  # dbaas CRs
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabasedeclarations
    verbs: [ get, list, watch, create, update, patch, delete ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabasedeclarations/status
    verbs: [ get, update, patch ]
  - apiGroups: [ dbaas.netcracker.com ]
    resources:
      - externaldatabasedeclarations/finalizers
    verbs: [ update ]
  # Secrets (for credentials in ExternalDatabaseDeclaration)
  - apiGroups: [ "" ]
    resources: [ secrets ]
    verbs: [ get, list, watch ]
  # Leader election
  - apiGroups: [ coordination.k8s.io ]
    resources: [ leases ]
    verbs: [ get, list, watch, create, update, patch, delete ]
  - apiGroups: [ "" ]
    resources: [ events ]
    verbs: [ create, patch ]
{{- end }}
