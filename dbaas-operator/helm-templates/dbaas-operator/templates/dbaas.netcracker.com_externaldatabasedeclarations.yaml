{{- if .Values.INSTALL_DBAAS_OPERATOR }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: externaldatabasedeclarations.dbaas.netcracker.com
spec:
  group: dbaas.netcracker.com
  names:
    kind: ExternalDatabaseDeclaration
    listKind: ExternalDatabaseDeclarationList
    plural: externaldatabasedeclarations
    singular: externaldatabasedeclaration
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .spec.type
          name: Type
          type: string
        - jsonPath: .spec.dbName
          name: DbName
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            ExternalDatabaseDeclaration is the Schema for the externaldatabasedeclarations API.
            It registers a pre-existing (externally managed) database in dbaas so that
            microservices can discover its connection details through the standard dbaas API.
            Unlike DatabaseDeclaration, the physical database is not created or destroyed by dbaas;
            dbaas only stores and serves its connection properties.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: spec defines the desired state of ExternalDatabaseDeclaration.
              properties:
                classifier:
                  additionalProperties:
                    type: string
                  description: |-
                    classifier is a key-value map that uniquely identifies the external database in dbaas.
                    Typical keys: namespace, microserviceName, scope, tenantId.
                    The aggregator requires at minimum: microserviceName, scope.
                    If scope is "tenant", tenantId must also be present.
                  type: object
                connectionProperties:
                  description: |-
                    connectionProperties lists the connection details for each access role.
                    At least one entry is required. Each entry must have a "role" field; the
                    aggregator rejects requests where any entry is missing "role".
                  items:
                    description: |-
                      ConnectionProperty describes how to connect to the external database for a specific role.
                      The controller assembles a flat map from role, credentialsSecretRef, and extraProperties
                      before sending the request to dbaas-aggregator.

                      Merge order (later sources win on key collision):

                       1. extraProperties — lowest priority
                       2. role            — overrides extraProperties["role"]
                       3. credentialsSecretRef.keys — highest priority, override matching extraProperties keys

                      All other connection parameters (host, port, url, authDbName, sslMode, etc.) must be
                      supplied via extraProperties.
                    properties:
                      credentialsSecretRef:
                        description: |-
                          credentialsSecretRef points to a Kubernetes Secret and maps its keys into the
                          aggregator request flat map. The Secret must exist in the same namespace as the CR.
                          Resolved Secret values take precedence over matching keys in extraProperties.
                        properties:
                          keys:
                            description: |-
                              keys is the list of mappings from Secret.data keys to aggregator request keys.
                              Each entry reads Secret.data[key] and inserts it into the aggregator flat map
                              under name. Secret credentials always take precedence over the same keys in
                              extraProperties. At least one mapping is required.
                            items:
                              description: |-
                                SecretKeyMapping maps a single key from a Kubernetes Secret to a key
                                in the aggregator request flat map.
                              properties:
                                key:
                                  description: key is the key inside Secret.data whose
                                    value will be read.
                                  minLength: 1
                                  type: string
                                name:
                                  description: |-
                                    name is the key to use in the aggregator request flat map.
                                    Secret credentials take precedence over the same key in extraProperties.
                                  minLength: 1
                                  type: string
                              required:
                                - key
                                - name
                              type: object
                            minItems: 1
                            type: array
                          name:
                            description: name is the name of the Kubernetes Secret containing
                              the credentials.
                            minLength: 1
                            type: string
                        required:
                          - keys
                          - name
                        type: object
                      extraProperties:
                        additionalProperties:
                          type: string
                        description: |-
                          extraProperties holds all adapter-specific connection parameters as string key-value pairs.
                          Use this to supply host, port, url, authDbName, sslMode, and any other parameters
                          required by the dbaas-aggregator adapter.
                          All keys are merged into the flat map sent to the aggregator.
                          The "role" key and Secret credentials always override any values set here for those keys.
                        type: object
                      role:
                        description: |-
                          role identifies the access level for this connection entry.
                          The value is adapter-specific, e.g. "admin", "readonly", "readwrite".
                          Required by dbaas-aggregator: every connectionProperties entry must contain a "role" key.
                          Takes precedence over the same key in extraProperties.
                        minLength: 1
                        type: string
                    required:
                      - role
                    type: object
                  minItems: 1
                  type: array
                dbName:
                  description: |-
                    dbName is the name of the logical database as it exists in the external DBMS.
                    Unlike DatabaseDeclaration (where the name is auto-generated), this field is
                    required because the external database already exists with a known name.
                  minLength: 1
                  type: string
                type:
                  description: |-
                    type is the database engine type, e.g. "postgresql", "mongodb".
                    Must match a type registered in dbaas-aggregator.
                  minLength: 1
                  type: string
              required:
                - classifier
                - connectionProperties
                - dbName
                - type
              type: object
            status:
              description: status defines the observed state of ExternalDatabaseDeclaration.
              properties:
                conditions:
                  description: |-
                    conditions represent the current state of the resource.
                    Condition types used by all dbaas operator resources (ExternalDatabaseDeclaration, DbPolicy, DatabaseDeclaration):
                      - "Ready"   - True when the resource was successfully processed by
                                    dbaas-aggregator for the current generation.
                                    False on any error; see Reason for the category.
                                    ExternalDatabaseDeclaration: reason "DatabaseRegistered" on success.
                                    DbPolicy: reason "PolicyApplied" on success.
                                    DatabaseDeclaration: reason "DatabaseProvisioned" on success;
                                      reason "ProvisioningStarted" while the async operation is in progress.
                      - "Stalled" - True when the error is permanent and the controller will
                                    not retry until the spec is changed (e.g. InvalidSpec,
                                    AggregatorRejected). False for transient errors that are
                                    retried automatically (e.g. SecretError, AggregatorError,
                                    Unauthorized, ProvisioningStarted).
                  items:
                    description: Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastRequestId:
                  description: |-
                    lastRequestId is the X-Request-Id of the most recent reconcile attempt.
                  type: string
                observedGeneration:
                  description: |-
                    observedGeneration reflects the .metadata.generation that was last processed
                    by the controller. When the current generation differs from this value, the
                    controller clears all conditions and starts a fresh reconciliation cycle.
                    Zero (or less than metadata.generation) means the current generation has not
                    yet been fully reconciled — for example, the controller is in BackingOff
                    waiting for a transient error to clear.
                  format: int64
                  type: integer
                phase:
                  default: Unknown
                  description: phase represents the current processing phase of the
                    resource.
                  enum:
                    - Unknown
                    - Processing
                    - WaitingForDependency
                    - Succeeded
                    - BackingOff
                    - InvalidConfiguration
                  type: string
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
{{- end }}
