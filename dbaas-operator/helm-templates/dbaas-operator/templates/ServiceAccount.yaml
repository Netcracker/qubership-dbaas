apiVersion: v1
kind: ServiceAccount
metadata:
    name: '{{ .Values.SERVICE_NAME }}'
    namespace: '{{ .Values.NAMESPACE }}'
    labels:
        app.kubernetes.io/part-of: 'dbaas'
        app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
        deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID | default "unimplemented" }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: '{{ .Values.SERVICE_NAME }}'
    labels:
        app.kubernetes.io/part-of: 'dbaas'
        app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
rules:
    # dbaas CRs
    - apiGroups: [dbaas.netcracker.com]
      resources:
          - databasedeclarations
          - dbpolicies
          - externaldatabasedeclarations
      verbs: [get, list, watch, create, update, patch, delete]
    - apiGroups: [dbaas.netcracker.com]
      resources:
          - databasedeclarations/status
          - dbpolicies/status
          - externaldatabasedeclarations/status
      verbs: [get, update, patch]
    - apiGroups: [dbaas.netcracker.com]
      resources:
          - databasedeclarations/finalizers
          - dbpolicies/finalizers
          - externaldatabasedeclarations/finalizers
      verbs: [update]
    # Secrets (for credentials in ExternalDatabaseDeclaration)
    - apiGroups: [""]
      resources: [secrets]
      verbs: [get, list, watch]
    # Leader election
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [get, list, watch, create, update, patch, delete]
    - apiGroups: [""]
      resources: [events]
      verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: '{{ .Values.SERVICE_NAME }}'
    labels:
        app.kubernetes.io/part-of: 'dbaas'
        app.kubernetes.io/managed-by: '{{ .Values.MANAGED_BY }}'
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: '{{ .Values.SERVICE_NAME }}'
subjects:
    - kind: ServiceAccount
      name: '{{ .Values.SERVICE_NAME }}'
      namespace: '{{ .Values.NAMESPACE }}'
