# ============== DEPLOYMENT VARIABLES ============================
SERVICE_NAME: dbaas-operator
NODE_SELECTOR_DBAAS_KEY: region
REGION_DBAAS: database
READONLY_CONTAINER_FILE_SYSTEM_ENABLED: true
MANAGED_BY: saasDeployer
LIVENESS_PROBE_INITIAL_DELAY_SECONDS: 15
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-operator
TAG: feat-dbaas-operator-snapshot
NAMESPACE: default
PAAS_PLATFORM: KUBERNETES
PAAS_VERSION: '1.25'
CLOUD_TOPOLOGY_KEY: kubernetes.io/hostname
DBAAS_OPERATOR_ENABLED: false
MONITORING_ENABLED: true
restrictedEnvironment: false

# ============== SERVICE VARIABLES ============================
LOG_LEVEL: "info"
K8S_EVENTS_ENABLED: false
LEADER_ELECT: true
# Rotation poll period as a Go duration (e.g. 15s, 1m). Leave empty to use the
# operator's built-in default (30s). The leader polls dbaas-aggregator's
# changed-databases feed at this interval to propagate password rotations.
DBAAS_ROTATION_POLL_INTERVAL: ""

# ExternalDatabase resync period as a Go duration (e.g. 30s, 1m). ExternalDatabase has no Secret
# watch, so a referenced credential Secret change is picked up on this resync. Leave empty to use
# the operator's built-in default (10m).
DBAAS_EXTERNAL_DATABASE_RESYNC_INTERVAL: ""

# ============== AGGREGATOR AUTHENTICATION ============================
# Authentication mode for outbound calls to dbaas-aggregator. MUST match the
# aggregator's own KUBERNETES_M2M_ENABLED setting, otherwise every call is rejected:
#   true  → Kubernetes projected service-account token (Bearer / M2M); a
#           dbaas-audience token volume is mounted at /var/run/secrets/tokens.
#   false → HTTP Basic Auth; the chart creates the dbaas-operator-aggregator-credentials
#           Secret from the values below, mounts it at /etc/dbaas/security, and the
#           operator reads username/password from it (hot-reloaded on rotation).
KUBERNETES_M2M_ENABLED: false
# Basic Auth credentials (Basic Auth mode only). Must match the user provisioned on
# the aggregator side (its DBAAS_OPERATOR_CREDENTIALS_*), which must carry the
# DB_CLIENT and CLUSTER_OPERATOR roles. The password is required in Basic Auth mode.
DBAAS_OPERATOR_CREDENTIALS_USERNAME: dbaas-operator
DBAAS_OPERATOR_CREDENTIALS_PASSWORD: ""

