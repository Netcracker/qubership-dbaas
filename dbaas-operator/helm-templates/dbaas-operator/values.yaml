# ============== DEPLOYMENT VARIABLES ============================
SERVICE_NAME: dbaas-operator
NODE_SELECTOR_DBAAS_KEY: region
REGION_DBAAS: database
READONLY_CONTAINER_FILE_SYSTEM_ENABLED: true
MANAGED_BY: saasDeployer
LIVENESS_PROBE_INITIAL_DELAY_SECONDS: 15
IMAGE_REPOSITORY: ghcr.io/netcracker/qubership-dbaas-operator
TAG: feat-dbaas-operator-snapshot
NAMESPACE: default
PAAS_PLATFORM: KUBERNETES
PAAS_VERSION: '1.25'
CREATE_OPERATOR_CLUSTER_ROLE: false
CREATE_OPERATOR_CLUSTER_ROLE_BINDING: false

# ============== SERVICE VARIABLES ============================
DBAAS_SECURITY_CONFIGURATION_LOCATION: '/etc/dbaas/security'
DBAAS_AGGREGATOR_USERNAME: cluster-dba
WATCH_NAMESPACES: ''
LOG_LEVEL: "info"

# ============== Resources ============================
CPU_REQUEST: "10m"
CPU_LIMIT: "500m"
MEMORY_REQUEST: "64Mi"
MEMORY_LIMIT: "128Mi"
REPLICAS: 1
HPA_ENABLED: false
HPA_AVG_CPU_UTILIZATION_TARGET_PERCENT: 75

# ============== Topology ============================
CLOUD_TOPOLOGY_KEY: "kubernetes.io/hostname"
